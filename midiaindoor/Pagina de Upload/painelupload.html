<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <title>Gerenciador Pro — ChamadorApp</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <style>
         :root {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --primary: #1058a2;
            --primary-dark: #0d4682;
            --danger: #ff4d4f;
            --success: #52c41a;
            --radius: 16px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            margin: 0;
            background: var(--bg);
            color: #1f2937;
            display: none;
            flex-direction: column;
            min-height: 100vh;
        }
        
        * {
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        
        .top-bar {
            background: #fff;
            padding: 10px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            border-bottom: 1px solid #e5e7eb;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        
        .brand-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo-preview {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            object-fit: contain;
            background: #f9fafb;
            border: 1px solid #eee;
        }
        
        .account-info {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f3f4f6;
            padding: 6px 14px;
            border-radius: 100px;
            border: 1px solid #e5e7eb;
        }
        
        .account-name {
            font-size: 13px;
            font-weight: 600;
            color: #374151;
        }
        
        .logout-btn {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            padding: 0 5px;
        }
        
        .main-container {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 25px;
            padding: 25px 40px;
            flex: 1;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }
        
        @media (max-width: 1100px) {
            .main-container {
                grid-template-columns: 1fr;
            }
        }
        
        .glass-panel {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.7);
            height: fit-content;
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        h2 {
            margin: 0;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #111827;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #4b5563;
        }
        
        input[type="text"],
        input[type="search"] {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            background: #f9fafb;
            outline: none;
        }
        
        input:focus {
            border-color: #1058a2;
            box-shadow: 0 0 0 3px rgba(16, 88, 162, 0.1);
        }
        
        .btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
        }
        
        .btn-primary {
            background: #1058a2;
            color: white;
        }
        
        .btn-ghost {
            background: #f3f4f6;
            color: #374151;
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid #d1d5db;
            color: #374151;
        }
        
        .btn-purple {
            background: #6366f1;
            color: white;
        }
        
        .btn-orange {
            background: #f97316;
            color: white;
        }
        
        .btn-danger-outline {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            margin-top: 10px;
            width: 100%;
        }
        
        .media-grid {
            display: grid;
            gap: 12px;
        }
        
        .media-card {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            background: #fff;
            border-radius: 12px;
            border: 1px solid #edf2f7;
            cursor: grab;
        }
        
        .thumb-box {
            width: 90px;
            height: 60px;
            border-radius: 8px;
            background: #000;
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
            border: 1px solid #ddd;
        }
        
        .thumb-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .thumb-box iframe {
            width: 400px;
            height: 300px;
            border: none;
            transform: scale(0.23);
            transform-origin: 0 0;
            pointer-events: none;
        }
        
        .switch-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f9fafb;
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            margin-bottom: 15px;
        }
        
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }
        
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 20px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked+.slider {
            background-color: var(--success);
        }
        
        input:checked+.slider:before {
            transform: translateX(20px);
        }
        
        input[type="color"] {
            height: 40px;
            width: 100%;
            cursor: pointer;
            border: 1px solid #d1d5db;
            padding: 2px;
            border-radius: 8px;
            background: white;
        }
        
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            width: 95%;
            max-width: 500px;
            padding: 30px;
            border-radius: 20px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1f2937;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            display: none;
            z-index: 200;
            box-shadow: var(--shadow);
        }
        
        .lib-card {
            padding: 10px;
            background: #fff;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.3s;
        }
        
        .lib-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
        }
        
        .lib-thumb {
            width: 100%;
            height: 100px;
            background: #eee;
            border-radius: 8px;
            margin-bottom: 8px;
            overflow: hidden;
            position: relative;
        }
        
        .lib-thumb iframe {
            width: 1000px;
            height: 800px;
            border: none;
            transform: scale(0.12);
            transform-origin: 0 0;
            pointer-events: none;
        }
        
        .menu-opt-btn {
            width: 100%;
            padding: 20px;
            margin-bottom: 10px;
            text-align: left;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            background: #f9fafb;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .menu-opt-btn:hover {
            background: #f3f4f6;
            border-color: var(--primary);
        }
        
        .menu-opt-btn i {
            font-size: 24px;
        }
 /* --- ESTILIZAÇÃO MODERNA DO AGENDAMENTO --- */

/* Ajuste no Overlay para o novo padrão */
#modalSchedule.modal-overlay {
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(8px);
}

/* Card do Modal */
#modalSchedule .modal-content {
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    background: #ffffff;
}

#modalSchedule h2 {
    font-size: 1.4rem;
    color: var(--primary);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
}

/* Container dos Dias (Visual de botões modernos) */
.days-selector {
    display: flex;
    justify-content: space-between;
    gap: 6px;
    background: var(--bg);
    padding: 8px;
    border-radius: 14px;
    margin: 8px 0 24px 0;
    border: 1px solid var(--border);
}

.day-label {
    flex: 1;
    height: 40px;
    border: none !important; /* Remove bordas antigas */
    background: #fff;
    color: var(--muted);
    border-radius: 10px;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: var(--shadow-sm);
    font-weight: 700;
}

/* Estado Ativado do Dia (Premium Upgrade) */
/* Esconde o checkbox original completamente */
.day-checkbox {
    display: none !important;
}

/* Base do botão do dia (o círculo/quadrado arredondado) */
.day-label {
    flex: 1;
    height: 40px;
    max-width: 40px; /* Mantém redondo se o espaço sobrar */
    background: #f1f5f9; /* Cor de fundo quando desmarcado */
    color: #64748b;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    border: 1px solid transparent;
    user-select: none; /* Evita selecionar o texto ao clicar rápido */
}

/* Estado Ativado (Quando o usuário clica) */
.day-checkbox:checked + .day-label {
    background: var(--brand, #2563eb) !important;
    color: white !important;
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 8px 15px rgba(37, 99, 235, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.2) !important;
}

/* Hover (Passar o mouse) */
.day-label:hover:not(.day-checkbox:checked + .day-label) {
    background: #fff;
    border-color: var(--brand);
    color: var(--brand);
    transform: translateY(-1px);
}

/* Feedback de clique */
.day-label:active {
    transform: scale(0.95);
}

/* Melhoria nos Inputs de Data e Hora */
.input-group label {
    font-size: 11px;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 6px;
}

#modalSchedule input[type="date"], 
#modalSchedule input[type="time"] {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    background: var(--bg);
    color: var(--primary);
    transition: all 0.2s;
}

#modalSchedule input:focus {
    outline: none;
    border-color: var(--brand);
    background: #fff;
    box-shadow: 0 0 0 3px var(--brand-light);
}

/* Botão de Salvar em Destaque */
.btn-save-schedule {
    background: var(--brand);
    color: white;
    padding: 14px;
    border-radius: 12px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    width: 100%;
    font-size: 15px;
    transition: all 0.2s;
    margin-top: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.btn-save-schedule:hover {
    filter: brightness(1.05);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
}
    </style>
</head>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDiTbWSlcKpsPEtEzPkSU0jHZkfcAg5fNU",
            authDomain: "newsmartonapp.firebaseapp.com",
            projectId: "newsmartonapp",
            databaseURL: "https://newsmartonapp-default-rtdb.firebaseio.com",
            storageBucket: "newsmartonapp.firebasestorage.app"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        let playlistLocal = [];

        const CORES_PADRAO = {
            logoUrl: "./audio/logo.png",
            corFooter: "#212529",
            corFooterText: "#ffffff",
            corNumero: "#ffcc00",
            showFooter: true,
            showLogoFooter: true
        };

        const urlParams = new URLSearchParams(window.location.search);
        const deviceId = urlParams.get('device');

        function getDeviceRef() {
            const user = auth.currentUser;
            if (!user || !deviceId) return null;
            return db.collection('usuarios').doc(user.uid).collection('dispositivos').doc(deviceId);
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                if (!deviceId) {
                    alert("ID do dispositivo não encontrado na URL.");
                    window.location.href = '../index.html';
                    return;
                }
                document.body.style.display = 'flex';
                document.getElementById('userEmail').textContent = user.email.split('@')[0];

            safeSet('cfgShowFooter', data.showFooter !== undefined ? data.showFooter : true, 'checked');
            safeSet('cfgShowLogoFooter', data.showLogoFooter !== undefined ? data.showLogoFooter : true, 'checked');

       function listarMidias() {
    const container = document.getElementById('list');
    const searchInput = document.getElementById('searchInput');
    const search = searchInput ? searchInput.value.toLowerCase() : '';
    container.innerHTML = '';

    let visiveis = 0;
    // Usamos playlistLocal para renderizar
    playlistLocal.forEach((midia, index) => {
        if (search && !midia.nome.toLowerCase().includes(search)) return;
        visiveis++;

        let thumbContent = '';
        const url = midia.url ? midia.url.trim() : '';

        if (midia.tipo === 'IMAGEM') {
            thumbContent = `<img src="${url}" style="width:100%; height:100%; object-fit:cover;">`;
        } else if (midia.tipo === 'VIDEO') {
            thumbContent = `<video src="${url}#t=0.1" preload="metadata" muted style="width:100%; height:100%; object-fit:cover; background:#000;"></video>`;
        } else {
            let finalUrl = url;
            if (url.includes("docs.google.com/presentation")) {
                finalUrl = url.replace(/\/pub\?/, "/embed?").replace(/\/edit(#.*)?$/, "/embed");
            }

            thumbContent = `
            <div style="width: 100%; height: 100%; overflow: hidden; display: flex; align-items: center; justify-content: center; background: white;">
                <iframe src="${finalUrl}" 
                        style="width: 300px; height: 200px; border: none; transform: scale(0.27); transform-origin: center; pointer-events: none;" 
                        scrolling="no"></iframe>
            </div>`;
        }

        const card = document.createElement('div');
        card.className = 'media-card';
        // Adicionamos um cursor para indicar que é arrastável
        card.style.cursor = 'move';
        card.innerHTML = `
            <div class="thumb-box" style="width: 80px; height: 50px; min-width: 80px; border-radius: 6px; overflow: hidden; background: #f3f4f6; border: 1px solid #ddd; position: relative; display: flex; align-items: center; justify-content: center;">
                ${thumbContent}
            </div>
            <div style="flex: 1; margin-left: 12px; overflow: hidden;">
                <div style="font-weight: 600; font-size: 13px; color: #111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                    ${midia.nome}
                </div>
                <div style="font-size: 11px; color: #6b7280;">${midia.tipo} • ${midia.duracao || 12}s</div>
            </div>
<div style="display: flex; gap: 4px;">
    <button class="btn btn-ghost" onclick="abrirAgendamento(${index})" title="Agendar">📅</button>
    <button class="btn btn-ghost" onclick="editarDuracao(${index}, ${midia.duracao || 12})">🕒</button>
    <button class="btn btn-ghost" onclick="excluirMidia(${index})" style="color: #ef4444;">🗑️</button>
</div>
        `;
        container.appendChild(card);
    });

    if (document.getElementById('noMedia')) {
        document.getElementById('noMedia').style.display = visiveis === 0 ? 'block' : 'none';
    }

    // --- FUNCIONALIDADE DE ARRASTAR (SORTABLE) ---
    if (typeof Sortable !== 'undefined' && visiveis > 1) {
        new Sortable(container, {
            animation: 150,
            ghostClass: 'sortable-ghost', // opcional: adicione estilo no CSS para esta classe
            onEnd: async function (evt) {
                // Se a posição não mudou, ignora
                if (evt.oldIndex === evt.newIndex) return;

                // Move o item dentro do array local
                const itemMovido = playlistLocal.splice(evt.oldIndex, 1)[0];
                playlistLocal.splice(evt.newIndex, 0, itemMovido);

                // Salva no Firebase
                await salvarPlaylist();
                
                // Re-renderiza para atualizar os índices dos botões de editar/excluir
                listarMidias();
                
                if (typeof showToast === 'function') showToast("🔄 Ordem atualizada");
            }
        });
    }
}
function showScheduleModal(show) {
    const modal = document.getElementById('modalSchedule');
    if (show) {
        modal.classList.add('show');
    } else {

}

function abrirAgendamento(index) {
    console.log("Tentando abrir agendamento para o índice:", index);
    const midia = playlistLocal[index];
    if (!midia) {
        console.error("Mídia não encontrada no índice:", index);
        return;
    }

    document.getElementById('editScheduleIndex').value = index;
    
    // Fallback para agenda vazia
    const agenda = midia.agenda || { 
        dias: [], 
        dataInicio: '', 
        dataFim: '', 
        horaInicio: '00:00', 
        horaFim: '23:59' 
    };
    
    // Reset e preenchimento dos dias
    const diasIds = ['dom', 'seg', 'ter', 'qua', 'qui', 'sex', 'sab'];
    diasIds.forEach((id, idx) => {
        const checkbox = document.getElementById(id);
        if (checkbox) checkbox.checked = (agenda.dias && agenda.dias.includes(idx));
    });

    // Preencher inputs
    document.getElementById('dateStart').value = agenda.dataInicio || '';
    document.getElementById('dateEnd').value = agenda.dataFim || '';
    document.getElementById('timeStart').value = agenda.horaInicio || '00:00';
    document.getElementById('timeEnd').value = agenda.horaFim || '23:59';

    showScheduleModal(true);
}

async function salvarAgendamento() {
    const index = document.getElementById('editScheduleIndex').value;
    const diasIds = ['dom', 'seg', 'ter', 'qua', 'qui', 'sex', 'sab'];
    
    const diasSelecionados = [];
    diasIds.forEach((id, idx) => {
        if (document.getElementById(id).checked) {
            diasSelecionados.push(idx);
        }
    });

    const agenda = {
        dias: diasSelecionados,
        dataInicio: document.getElementById('dateStart').value,
        dataFim: document.getElementById('dateEnd').value,
        horaInicio: document.getElementById('timeStart').value,
        horaFim: document.getElementById('timeEnd').value
    };

    // Atualiza o objeto local
    if (!playlistLocal[index]) return;
    playlistLocal[index].agenda = agenda;

    try {
        // Certifique-se de que a função salvarPlaylist() existe no seu código principal
        await salvarPlaylist(); 
        showScheduleModal(false);
        showToast("📅 Agendamento salvo com sucesso!");
    } catch (err) {
        console.error(err);
        showToast("❌ Erro ao salvar agendamento");
    }
}

        async function editarDuracao(index, atual) {
            const nova = prompt("Tempo de exibição (segundos):", atual);
            if (nova !== null && !isNaN(nova) && nova > 0) {
                playlistLocal[index].duracao = parseInt(nova);
                await salvarPlaylist();
                showToast("⏱️ Tempo atualizado");
            }
        }

function gerarAgendaInfinita() {
    return {
        dataInicio: new Date().toISOString().split('T')[0], // Hoje
        dataFim: "2099-12-31",                             // Prazo infinito
        horaInicio: "00:00",
        horaFim: "23:59",
        dias: [0, 1, 2, 3, 4, 5, 6],                       // Todos os dias (Dom a Sáb)
        ativa: true
    };
}

 async function adicionarMidia() {
    const nome = document.getElementById('nomeMidia').value || 'Nova Mídia';
    const url = document.getElementById('linkMidia').value;
    
    if (!url) return alert("URL obrigatória");

    const novaMidia = {
        nome,
        url,
        tipo: detectaTipoUrl(url),
        duracao: 12,
        ativo: true,
        agenda: gerarAgendaInfinita() // Adicionado aqui
    };

    playlistLocal.push(novaMidia);
    await salvarPlaylist();

    showModal(false);
    document.getElementById('nomeMidia').value = '';
    document.getElementById('linkMidia').value = '';
    showToast("✅ Mídia adicionada");
}

        async function adicionarFrase() {
            const txt = document.getElementById('novaFrase').value.trim();
            if (!txt) return;

            const ref = getDeviceRef();
            const doc = await ref.get();
            const arr = doc.exists && doc.data().fraseRodape ? doc.data().fraseRodape : [];
            arr.push(txt);

            await ref.update({
                fraseRodape: arr
            });
            document.getElementById('novaFrase').value = '';
            showToast("✅ Frase adicionada");
        }

        function renderizarFrases(arr) {
            const list = document.getElementById('fraseList');
            list.innerHTML = '';
            arr.forEach((f, i) => {
                const item = document.createElement('div');
                item.style = "background:#f9fafb; padding:8px; border-radius:8px; display:flex; justify-content:space-between; font-size:12px; border:1px solid #eee";
                item.innerHTML = `<span>${f}</span><button onclick="removerFrase(${i})" style="border:none;background:none;color:red;cursor:pointer">✕</button>`;
                list.appendChild(item);
            });
        }

        async function removerFrase(index) {
            const ref = getDeviceRef();
            const doc = await ref.get();
            const arr = doc.data().fraseRodape || [];
            arr.splice(index, 1);
            await ref.update({
                fraseRodape: arr
            });
            showToast("🗑️ Frase removida");
        }

        function detectaTipoUrl(url) {
            const clean = url.split('?')[0].toLowerCase();
            if (['.mp4', '.webm'].some(ext => clean.endsWith(ext))) return 'VIDEO';
            if (['.jpg', '.jpeg', '.png', '.gif', '.webp'].some(ext => clean.endsWith(ext))) return 'IMAGEM';
            return 'HTML';
        }

        function detectaTipoInstantaneo() {
            const val = document.getElementById('linkMidia').value;

            if (!val) {

            box.innerHTML = `<span style="font-size:10px; color:#666">Tipo detectado: <b>${detectaTipoUrl(val)}</b></span>`;
        }
