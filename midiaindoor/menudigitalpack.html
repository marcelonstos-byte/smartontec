<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenuPack Pro - Smart Indoor Editor</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
         :root {
            --primary: #e63946;
            --dark-bg: #121212;
            --sidebar-bg: #1e1e1e;
            --card-bg: #2a2a2a;
            --gold: #ffb703;
            --accent: #457b9d;
            --highlight: rgba(255, 183, 3, 0.25);
        }
        
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Inter', sans-serif;
            display: flex;
        }
        
        #editor-region {
            flex: 1;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            transition: padding 0.3s;
            position: relative;
        }
        
        #canvas {
            position: relative;
            background: #111 no-repeat center center;
            background-size: cover;
            z-index: 1;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
            width: 1280px;
            height: 720px;
            transform-origin: center;
        }
        
        body.portrait-mode #canvas {
            width: 720px;
            height: 1280px;
        }
        
        #bg-filter {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2;
            pointer-events: none;
        }
        
        .draggable {
            position: absolute;
            z-index: 10;
            cursor: move;
            transition: outline 0.2s;
            transform-origin: top left;
        }
        
        body:not(.hide-admin) .draggable:hover {
            outline: 2px dashed var(--gold);
        }
        
        #logo-preview {
            width: 150px;
            min-height: 50px;
        }
        
        #text-header {
            color: white;
            min-width: 300px;
        }
        
        #text-header h1 {
            margin: 0;
            font-size: 2.5rem;
            text-transform: uppercase;
            color: var(--gold);
            font-weight: 900;
        }
        
        #text-header p {
            margin: 0;
            font-size: 1.2rem;
            opacity: 0.8;
        }
        
        #preview-principal {
            width: 400px;
            height: 400px;
            object-fit: contain;
            transition: opacity 0.5s;
        }
        
        #lista-container {
            width: 450px;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        #selector-highlight {
            position: absolute;
            left: 0;
            width: 100%;
            height: 72px;
            background: var(--highlight);
            border-left: 6px solid var(--gold);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
            pointer-events: none;
        }
        
        .menu-item {
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 15px;
            color: #fff;
            height: 36px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 6;
        }
        
        .item-nome {
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
        }
        
        .item-preco {
            font-size: 1.4rem;
            color: var(--gold);
            font-weight: bold;
        }
        
        #admin-panel {
            width: 400px;
            height: 100%;
            background: var(--sidebar-bg);
            color: #ecf0f1;
            z-index: 1000;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        
        .user-session-info {
            background: #111;
            padding: 15px 20px;
            border-bottom: 1px solid #333;
        }
        
        .session-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .session-label {
            font-size: 9px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .session-value {
            font-size: 11px;
            color: #eee;
            font-weight: 600;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #e63946;
            border-radius: 50%;
        }
        
        .status-dot.online {
            background: #27ae60;
            box-shadow: 0 0 5px #27ae60;
        }
        
        .panel-header {
            background: var(--dark-bg);
            padding: 20px;
            border-bottom: 2px solid var(--primary);
        }
        
        .tab-menu {
            display: flex;
            background: #111;
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            color: white;
            cursor: pointer;
            font-size: 11px;
            text-transform: uppercase;
        }
        
        .tab-btn.active {
            border-bottom: 3px solid var(--primary);
            background: var(--sidebar-bg);
        }
        
        .panel-content {
            padding: 20px;
            flex: 1;
        }
        
        .input-group {
            background: var(--card-bg);
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
        }
        
        .input-group label {
            display: block;
            font-size: 10px;
            color: #bdc3c7;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        
        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 8px;
            background: #000;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
            margin-bottom: 5px;
        }
        
        .btn-main {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
            transition: opacity 0.2s;
        }
        
        .btn-main:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-publish {
            background: var(--primary);
            color: white;
        }
        
        .btn-save {
            background: var(--accent);
            color: white;
        }
        
        .btn-add {
            background: #27ae60;
            color: white;
        }
        
        .slide-selector {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        
        .slide-thumb {
            padding: 8px 15px;
            background: #333;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 12px;
        }
        
        .slide-thumb.active {
            background: var(--primary);
        }
        
        .btn-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2000;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(42, 42, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            color: white;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>

<body class="hide-admin">

    <button class="btn-toggle" onclick="toggleAdmin()" title="Configurações">⚙️</button>

    <div id="editor-region">
        <div id="canvas">
            <div id="bg-filter"></div>
            <img id="logo-preview" src="" class="draggable" data-key="logo">
            <div id="text-header" class="draggable" data-key="header">
                <h1 id="view-title">CARDÁPIO DO DIA</h1>
                <p id="view-desc">Confira nossas ofertas especiais</p>
            </div>
            <img id="preview-principal" src="" class="draggable" data-key="img">
            <div id="lista-container" class="draggable" data-key="lista">
                <div id="selector-highlight"></div>
                <div id="items-render"></div>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="hidden">
        <div class="user-session-info">
            <div class="session-row">
                <span class="session-label">Sessão Ativa</span>
                <button id="auth-btn" style="background:none; border:1px solid var(--primary); color:var(--primary); cursor:pointer; font-size:10px; padding:2px 8px;" onclick="toggleLogin()">Login</button>
            </div>
            <div class="session-row">
                <div style="display:flex; align-items:center; gap:5px">
                    <div id="status-dot" class="status-dot"></div>
                    <span id="user-display" class="session-value">Desconectado</span>
                </div>
            </div>
            <div class="session-row" style="margin-top:10px; border-top: 1px solid #333; padding-top: 8px;">
                <span class="session-label">ID DA TV:</span>
                <span id="display-device-id" class="session-value" style="color:var(--gold); cursor:pointer" onclick="changeDevicePrompt()">---</span>
            </div>
        </div>

        <div class="panel-header">
            <h3 style="margin:0">MenuPack <span style="color:var(--primary)">PRO</span></h3>
        </div>

        <div class="tab-menu">
            <button class="tab-btn active" onclick="openTab('layout')">Layout</button>
            <button class="tab-btn" onclick="openTab('produtos')">Produtos</button>
            <button class="tab-btn" onclick="openTab('slides')">Slides</button>
        </div>

        <div class="panel-content">
            <div id="tab-layout" class="tab-pane">
                <div class="input-group">
                    <label>Orientação</label>
                    <select id="in-orientation" onchange="updateOrientation(this.value)">
                        <option value="landscape">Paisagem (Horizontal)</option>
                        <option value="portrait">Retrato (Vertical)</option>
                    </select>
                    <label>Fundo (URL)</label>
                    <input type="text" id="in-bg" onchange="updateBase('bg', this.value)">
                    <label>Logo (URL)</label>
                    <input type="text" id="in-logo" onchange="updateBase('logo', this.value)">
                </div>
                <div class="input-group">
                    <label>Textos Fixos</label>
                    <input type="text" id="in-title" placeholder="Título" oninput="updateBase('title', this.value)">
                    <input type="text" id="in-desc" placeholder="Descrição" oninput="updateBase('desc', this.value)">
                </div>
                <div class="input-group">
                    <label>Escalas</label>
                    <small>Logo</small> <input type="range" min="0.5" max="3" step="0.1" id="sc-logo" oninput="updateScale('logo', this.value)">
                    <small>Textos</small> <input type="range" min="0.5" max="3" step="0.1" id="sc-header" oninput="updateScale('header', this.value)">
                    <small>Lista</small> <input type="range" min="0.5" max="3" step="0.1" id="sc-lista" oninput="updateScale('lista', this.value)">
                </div>
            </div>

            <div id="tab-produtos" class="tab-pane hidden">
                <div id="admin-items-list"></div>
                <button class="btn-main btn-add" onclick="addItem()">+ Adicionar Produto</button>
            </div>

            <div id="tab-slides" class="tab-pane hidden">
                <div class="slide-selector" id="slide-nav"></div>
                <div class="input-group">
                    <label>Duração do Slide (segundos)</label>
                    <input type="number" id="in-duration" min="5" onchange="updateBase('duracao', this.value)">
                </div>
                <button class="btn-main btn-add" onclick="duplicateSlide()">Duplicar Slide</button>
                <button class="btn-main" style="background:#c0392b; color:white" onclick="deleteSlide()">Excluir Slide</button>
            </div>

            <hr style="border:0; border-top: 1px dashed #444; margin: 20px 0;">
            <button id="btn-sync" class="btn-main btn-save" onclick="salvarRascunho()">Sincronizar Nuvem</button>
            <button id="btn-pub" class="btn-main btn-publish" onclick="publicarNaPlaylist()">Publicar na TV Agora</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDiTbWSlcKpsPEtEzPkSU0jHZkfcAg5fNU",
            authDomain: "newsmartonapp.firebaseapp.com",
            projectId: "newsmartonapp",
            storageBucket: "newsmartonapp.firebasestorage.app",
            messagingSenderId: "1096968028299",
            appId: "1:1096968028299:web:f3a9e48db108afbbb7548e",
            databaseURL: "https://newsmartonapp-default-rtdb.firebaseio.com"
        };

        // Inicialização Segura do Firebase
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- NOVO: Captura de ID com Prioridade para URL e Persistência ---
        const urlParams = new URLSearchParams(window.location.search);
        const currentId = urlParams.get('id') || urlParams.get('device');

        if (currentId) {
            localStorage.setItem('lastId', currentId); // Sincroniza storage com o novo parâmetro
        }

        // Estado Global com Proteção de Dados
        let appState = {
            deviceId: currentId || localStorage.getItem('lastId') || "SVbuSWCNoO42VqDPEmYg",
            ownerUid: null,
            currentUser: null,
            currentSlide: 0,
            activeItemIdx: 0,
            autoSaveTimer: null,
            slideRotationTimer: null,
            highlightTimer: null,
            isEditor: true,
            slides: [],
            isInitialized: false,
            unsubscribe: null
        };

        // --- 1. UTILITÁRIOS E TEMPLATES ---

        function getDefaultTemplate() {
            return {
                nome: "NOVO SLIDE",
                duracao: 15,
                orientation: "landscape",
                bg: "https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=1920",
                logo_url: "https://cdn-icons-png.flaticon.com/512/732/732217.png",
                title: "MENU ESPECIAL",
                desc: "Confira nossas ofertas",
                preco: "19,90",
                url: "",
                dark_intensity: 0.4,
                anim_type: "anim-fade-in",
                scales: {
                    logo: 1,
                    header: 1,
                    img: 1,
                    lista: 1,
                    v_prod: 1
                },
                pos: {
                    lista: {
                        x: 750,
                        y: 150
                    },
                    img: {
                        x: 100,
                        y: 150
                    },
                    logo: {
                        x: 50,
                        y: 30
                    },
                    header: {
                        x: 250,
                        y: 40
                    },
                    v_prod: {
                        x: 1000,
                        y: 100
                    }
                },
                lista: [{
                    nome: "Item Exemplo",
                    preco: "35,00",
                    img: ""
                }]
            };
        }

        function toggleLoader(show) {
            let loader = document.getElementById('loading-screen');
            if (!loader && show) {
                loader = document.createElement('div');
                loader.id = 'loading-screen';
                loader.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:#000; color:#fff; display:flex; align-items:center; justify-content:center; z-index:9999; font-family:sans-serif; transition: opacity 0.5s;";
                loader.innerHTML = "<div><h2 style='text-align:center'>Carregando Menu Pack Pro...</h2></div>";
                document.body.appendChild(loader);
            }
            if (loader) {
                loader.style.opacity = show ? "1" : "0";
                if (!show) setTimeout(() => loader.remove(), 500);
            }
        }

        function applyScaling() {
            const canvas = document.getElementById('canvas');
            const region = document.getElementById('editor-region');
            if (!canvas || !region) return;

            const adminPanel = document.getElementById('admin-panel');
            const isAdminVisible = adminPanel && !adminPanel.classList.contains('hidden');

            const availableWidth = isAdminVisible ? (window.innerWidth - 400) : window.innerWidth;
            const availableHeight = window.innerHeight;

            const scale = Math.min(
                (availableWidth - 40) / canvas.offsetWidth,
                (availableHeight - 40) / canvas.offsetHeight
            );

            canvas.style.transform = `scale(${scale})`;
            canvas.style.transformOrigin = "center center";
        }

        // --- 2. CORE: INITIALIZATION (ROBUSTEZA E CRIAÇÃO AUTOMÁTICA) ---

        async function init() {
            if (appState.unsubscribe) {
                appState.unsubscribe();
                appState.unsubscribe = null;
            }

            toggleLoader(true);
            appState.isInitialized = true;

            const displayEl = document.getElementById('display-device-id');
            if (displayEl) displayEl.innerText = appState.deviceId;

            try {
                // Busca o dispositivo em qualquer conta (lógica do Smart Indoor V6)
                const snap = await db.collectionGroup('dispositivos').get();
                const deviceDoc = snap.docs.find(d => d.id === appState.deviceId);

                if (!deviceDoc) {
                    throw new Error(`O dispositivo "${appState.deviceId}" não existe no sistema.`);
                }

                // Descobre o UID dono pelo caminho do documento
                appState.ownerUid = deviceDoc.ref.parent.parent.id;

                // Mapeamento de hierarquia
                const pathSegments = deviceDoc.ref.path.split('/');
                appState.ownerUid = pathSegments[1];

                const menuPackPath = `usuarios/${appState.ownerUid}/dispositivos/${appState.deviceId}/MenuPack/data`;
                const docRef = db.doc(menuPackPath);

                // --- 2.1 Listener com Lógica de Verificação/Criação (Else Create) ---
                appState.unsubscribe = docRef.onSnapshot(doc => {
                    if (doc.exists) {
                        const data = doc.data();

                        // Sanitização e Mesclagem com Template
                        appState.slides = (data.slides || [getDefaultTemplate()]).map(s => ({
                            ...getDefaultTemplate(),
                            ...s,
                            pos: {...getDefaultTemplate().pos,
                                ...(s.pos || {})
                            },
                            scales: {...getDefaultTemplate().scales,
                                ...(s.scales || {})
                            }
                        }));

                        loadSlide(appState.currentSlide);
                        startSlideRotation();
                        startHighlightRotation();
                        toggleLoader(false);
                    } else {
                        // --- CASO NÃO EXISTA: Cria estrutura inicial no Firebase ---
                        console.log("Configuração não encontrada. Criando documento inicial...");
                        const initialData = {
                            slides: [getDefaultTemplate()],
                            lastUpdate: firebase.firestore.FieldValue.serverTimestamp()
                        };

                        docRef.set(initialData).then(() => {
                            appState.slides = initialData.slides;
                            loadSlide(0);
                            toggleLoader(false);
                        });
                    }
                }, error => {
                    console.error("Erro no Firebase Snapshot:", error);
                    toggleLoader(false);
                });

            } catch (error) {
                console.error("Erro de Inicialização:", error.message);
                alert("Erro: " + error.message);
                toggleLoader(false);
            }

            setTimeout(applyScaling, 600);
        }

        // --- 3. RENDERIZAÇÃO E POSICIONAMENTO ---

        function loadSlide(idx) {
            if (!appState.slides || appState.slides.length === 0) return;
            if (idx >= appState.slides.length) idx = 0;

            appState.currentSlide = idx;
            const s = appState.slides[idx];

            const mapping = {
                'in-bg': s.bg,
                'in-logo': s.logo_url,
                'in-title': s.title,
                'in-desc': s.desc,
                'in-orientation': s.orientation,
                'in-duration': s.duracao || 15,
                'sc-logo': s.scales.logo,
                'sc-header': s.scales.header,
                'sc-lista': s.scales.lista
            };

            Object.keys(mapping).forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = mapping[id];
            });

            updateOrientation(s.orientation);
            renderCanvas();
            applyPositionsAndScales();
        }

        function renderCanvas() {
            const s = appState.slides[appState.currentSlide];
            if (!s) return;

            const canvas = document.getElementById('canvas');
            if (canvas) canvas.style.backgroundImage = s.bg ? `url('${s.bg}')` : 'none';

            const logo = document.getElementById('logo-preview');
            if (logo) logo.src = s.logo_url || '';

            const title = document.getElementById('view-title');
            if (title) title.innerText = s.title || '';

            const desc = document.getElementById('view-desc');
            if (desc) desc.innerText = s.desc || '';

            const list = document.getElementById('items-render');
            if (list && s.lista) {
                list.innerHTML = s.lista.map(item => `
                    <div class="menu-item" style="height:72px; box-sizing:border-box">
                        <span class="item-nome">${item.nome}</span>
                        <span class="item-preco">R$ ${item.preco}</span>
                    </div>`).join('');
            }
            updateHighlight();
        }

        function applyPositionsAndScales() {
            const s = appState.slides[appState.currentSlide];
            if (!s) return;

            document.querySelectorAll('.draggable').forEach(el => {
                const key = el.getAttribute('data-key');
                const p = s.pos[key] || {
                    x: 0,
                    y: 0
                };
                const scale = s.scales[key] || 1;

                el.style.transform = `translate(${p.x}px, ${p.y}px) scale(${scale})`;
                el.setAttribute('data-x', p.x);
                el.setAttribute('data-y', p.y);
            });
        }

        // --- 4. ROTAÇÃO E TIMERS ---

        function startSlideRotation() {
            clearTimeout(appState.slideRotationTimer);
            if (appState.slides.length <= 1) return;

            const tempo = (parseInt(appState.slides[appState.currentSlide].duracao) || 15) * 1000;
            appState.slideRotationTimer = setTimeout(() => {
                appState.currentSlide = (appState.currentSlide + 1) % appState.slides.length;
                loadSlide(appState.currentSlide);
                startSlideRotation();
            }, tempo);
        }

        function startHighlightRotation() {
            clearInterval(appState.highlightTimer);
            appState.highlightTimer = setInterval(() => {
                const s = appState.slides[appState.currentSlide];
                if (s && s.lista && s.lista.length > 1) {
                    appState.activeItemIdx = (appState.activeItemIdx + 1) % s.lista.length;
                    updateHighlight();
                }
            }, 5000);
        }

        function updateHighlight() {
            const h = document.getElementById('selector-highlight');
            if (h) h.style.transform = `translateY(${appState.activeItemIdx * 72}px)`;
        }

        // --- 5. PERSISTÊNCIA ---

        async function salvarRascunho(isAuto = false) {
            if (!appState.ownerUid || !appState.deviceId) return;
            const path = `usuarios/${appState.ownerUid}/dispositivos/${appState.deviceId}/MenuPack/data`;

            try {
                await db.doc(path).set({
                    slides: appState.slides,
                    lastUpdate: firebase.firestore.FieldValue.serverTimestamp()
                }, {
                    merge: true
                });
                console.log(isAuto ? "Autosave ok." : "Sincronizado!");
            } catch (e) {
                console.error("Erro ao salvar:", e);
            }
        }

        function triggerAutoSave() {
            clearTimeout(appState.autoSaveTimer);
            appState.autoSaveTimer = setTimeout(() => salvarRascunho(true), 2000);
        }

        function updateOrientation(mode) {
            appState.slides[appState.currentSlide].orientation = mode;
            document.body.classList.toggle('portrait-mode', mode === 'portrait');
            setTimeout(applyScaling, 100);
        }

        // --- 6. EVENTOS DE BOOT ---

        auth.onAuthStateChanged(user => {
            appState.currentUser = user;
            init();
        });

        window.addEventListener('resize', applyScaling);

        document.addEventListener('touchmove', (e) => {
            if (e.target.closest('#canvas')) e.preventDefault();
        }, {
            passive: false
        });
    </script>
</body>

</html>
