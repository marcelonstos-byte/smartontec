<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart On | Hub de Dispositivos</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
         :root {
            --primary: #03517e;
            --primary-light: #0d84d1;
            --accent: #16A34A;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --whatsapp: #25D366;
            --online: #22c55e;
            --offline: #94a3b8;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }
        /* Barra Lateral */
        
        .sidebar {
            width: 280px;
            background: var(--primary);
            color: white;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }
        
        .user-profile {
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }
        
        .logo-container {
            width: 120px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }
        
        .logo-container img {
            max-width: 100%;
            height: auto;
            object-fit: contain;
        }
        
        .uid-container {
            margin-top: 8px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.6;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .uid-container:hover {
            opacity: 1;
            color: var(--primary-light);
        }
        /* Conteúdo Principal */
        
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 40px 5%;
            padding-bottom: 250px;
        }
        
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        
        .header-actions {
            display: flex;
            gap: 12px;
        }
        
        #deviceList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        
        .device-item {
            background: var(--card);
            padding: 25px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: 0.3s;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            position: relative;
        }
        
        .device-item:hover {
            transform: translateY(-5px);
            border-color: var(--primary-light);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        
        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(34, 197, 94, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
            }
        }
        
        .conn-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        
        .dot-online {
            background: var(--online);
            animation: pulse 2s infinite;
        }
        
        .dot-offline {
            background: var(--offline);
        }
        
        .device-info {
            margin-bottom: 20px;
        }
        
        .device-info strong {
            font-size: 1.2em;
            color: var(--primary);
            display: block;
            margin-bottom: 8px;
        }
        
        .device-info span {
            font-size: 0.85em;
            color: var(--text-muted);
            display: block;
            margin-bottom: 4px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            margin-top: 10px;
            text-transform: uppercase;
        }
        
        .active-bg {
            background: #dcfce7;
            color: #166534;
        }
        
        .paused-bg {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .device-actions {
            display: flex;
            gap: 8px;
            border-top: 1px solid #f1f5f9;
            padding-top: 15px;
            margin-top: auto;
        }
        
        button {
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: 0.2s;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-secondary {
            background: var(--primary-light);
            color: white;
        }
        
        .btn-edit {
            background: #fef3c7;
            color: #92400e;
        }
        
        .btn-ghost {
            background: #f1f5f9;
            color: #475569;
        }
        
        .btn-danger {
            background: #fee2e2;
            color: #b91c1c;
        }
        
        .health-dashboard {
            position: fixed;
            bottom: 0;
            left: 280px;
            right: 0;
            background: white;
            padding: 20px;
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 90;
            border-top: 1px solid #e2e8f0;
        }
        
        .chart-container {
            width: 300px;
            height: 150px;
            position: relative;
        }
        
        .health-info {
            margin-left: 40px;
            text-align: left;
        }
        
        .health-info h4 {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .health-info div {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
        }
        
        .btn-whatsapp {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--whatsapp);
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
            transition: 0.3s;
            z-index: 999;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
        }
        
        .modal-content {
            background: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            position: relative;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-family: inherit;
        }
        
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 25px;
        }
        /* Estilos do Modal de Menu Digital */
        
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        
        .menu-card {
            border: 2px solid #f1f5f9;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        .menu-card:hover {
            border-color: var(--primary-light);
            background: #f0f9ff;
            transform: translateY(-3px);
        }
        
        .menu-card i {
            font-size: 32px;
            color: var(--primary);
        }
        
        .menu-card h3 {
            font-size: 14px;
            color: var(--text-main);
        }
        
        @media (max-width: 900px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 20px;
            }
            .main-content {
                margin-left: 0;
                padding-bottom: 300px;
            }
            .health-dashboard {
                left: 0;
                flex-direction: column;
                height: auto;
                padding: 10px;
            }
            .health-info {
                margin-left: 0;
                text-align: center;
                margin-top: 10px;
            }
            .btn-whatsapp {
                bottom: 20px;
            }
            .header-container {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <div class="user-profile">
            <div class="logo-container">
                <img src="Exibidor/audio/logo.png" alt="Logo" onerror="this.src='https://via.placeholder.com/120x40?text=Smart+On'">
            </div>
            <p style="font-size: 0.8em; opacity: 0.7;">Bem-vindo ao Painel,</p>
            <h2 id="userDisplayName" style="font-size: 1.1em; margin-top: 5px;">Usuário Smart</h2>

            <div class="uid-container" onclick="copyUID()" title="Clique para copiar o UID">
                <span>UID:</span>
                <span id="userUIDDisplay">...</span>
                <i class="fa-regular fa-copy"></i>
            </div>
        </div>
        <nav style="flex-grow: 1;">
            <p style="font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.5; margin-bottom: 15px;">Terminais</p>
            <div style="background: rgba(255,255,255,0.1); padding: 12px; border-radius: 8px; font-size: 14px;">
                🖥️ Gerenciar Telas
            </div>
        </nav>
        <button class="btn-danger" style="width: 100%; background: rgba(239,68,68,0.2); color: #fca5a5;" onclick="logout()">Sair da Conta</button>
    </aside>

    <main class="main-content">
        <div class="header-container">
            <div>
                <h1 style="font-size: 28px;">Meus Terminais</h1>
                <p style="color: var(--text-muted);">Visualize e gerencie seus pontos de exibição</p>
            </div>
            <div class="header-actions">
                </button>
                <button class="btn-primary" onclick="openModal('create')" style="padding: 12px 20px; font-size: 15px;">
                    + Novo Terminal
                </button>
            </div>
        </div>

        <div id="deviceList">
            <p style="color: var(--text-muted);">Sincronizando dispositivos...</p>
        </div>
    </main>

    <section class="health-dashboard">
        <div class="chart-container">
            <canvas id="healthChart"></canvas>
        </div>
        <div class="health-info">
            <h4>SAÚDE DA REDE</h4>
            <div id="healthPercentage">0%</div>
            <p id="healthDetails" style="font-size: 12px; color: var(--text-muted);">Calculando...</p>
        </div>
    </section>

    <a href="https://wa.me/SEUNUMERODOTELEFONE" target="_blank" class="btn-whatsapp">
        <i class="fab fa-whatsapp" style="font-size: 24px;"></i> Suporte Smart On
    </a>

    <div id="deviceModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-bottom: 20px; color: var(--primary);">Novo Terminal</h2>
            <input type="hidden" id="editDeviceId">
            <div class="form-group">
                <label>Nome da Tela</label>
                <input type="text" id="nomeTela" placeholder="Ex: Recepção">
            </div>
            <div class="form-group" id="modoContainer">
                <label>Modo de Exibição</label>
                <select id="modo">
                    <option value="publicidade">Publicidade</option>
                    <option value="informativo">Informativo</option>
                </select>
            </div>
            <div class="modal-footer">
                <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
                <button class="btn-primary" id="btnSave" onclick="saveDevice()">Salvar Terminal</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDiTbWSlcKpsPEtEzPkSU0jHZkfcAg5fNU",
            authDomain: "newsmartonapp.firebaseapp.com",
            projectId: "newsmartonapp",
            storageBucket: "newsmartonapp.firebasestorage.app",
            messagingSenderId: "1096968028299",
            appId: "1:1096968028299:web:f3a9e48db108afbbb7548e",
            databaseURL: "https://newsmartonapp-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const firestore = firebase.firestore();
        const database = firebase.database();

        let healthChart;
        let activeListeners = {};
        let terminalStatus = {};

        function initChart() {
            const ctx = document.getElementById('healthChart').getContext('2d');
            healthChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Online', 'Offline'],
                    datasets: [{
                        data: [0, 100],
                        backgroundColor: ['#22c55e', '#e2e8f0'],
                        borderWidth: 0,
                        circumference: 180,
                        rotation: 270,
                        cutout: '80%'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    animation: {
                        duration: 1000
                    }
                }
            });
        }

        auth.onAuthStateChanged(user => {
            if (!user) {
                window.location.href = "login.html";
                return;
            }
            document.getElementById("userDisplayName").innerText = user.displayName || user.email.split('@')[0];
            document.getElementById("userUIDDisplay").innerText = user.uid;
            initChart();
            loadDevices(user.uid);
        });

        async function logout() {
            try {
                await auth.signOut();
                window.location.href = "login.html";
            } catch (error) {
                console.error("Erro ao sair:", error);
                alert("Erro ao encerrar a conta.");
            }
        }

        function copyUID() {
            const uid = document.getElementById("userUIDDisplay").innerText;
            navigator.clipboard.writeText(uid).then(() => alert("UID copiado!"));
        }

        function loadDevices(uid) {
            firestore.collection("usuarios").doc(uid).collection("dispositivos")
                .onSnapshot(snapshot => {
                    const list = document.getElementById("deviceList");
                    list.innerHTML = "";

                    if (snapshot.empty) {
                        list.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding: 50px; background: white; border-radius: 15px; color: #94a3b8;">Nenhum terminal cadastrado.</div>`;
                        updateHealthUI(0, 0);
                        return;
                    }

                    snapshot.forEach(doc => {
                        const data = doc.data();
                        const id = doc.id;

                        const item = document.createElement("div");
                        item.className = "device-item";
                        item.id = `card-${id}`;
                        item.onclick = () => {
                            window.location.href = `central.html?device=${id}`;
                        };

                        item.innerHTML = `
                            <div class="device-info">
                                <div style="font-size: 11px; margin-bottom: 5px;">
                                    <span id="dot-${id}" class="conn-dot dot-offline"></span> 
                                    <span id="text-${id}">Verificando...</span>
                                </div>
                                <strong>${data.nomeTela || "Sem nome"}</strong>
                                <span>ID: ${id}</span>
                                <span>Modo: ${data.modo}</span>
                                <div id="badge-${id}" class="status-badge ${data.ativo ? 'active-bg' : 'paused-bg'}">
                                    ${data.ativo ? "🟢 Ativo" : "🔴 Pausado"}
                                </div>
                                <div id="sync-${id}" style="font-size: 9px; color: #94a3b8; margin-top: 5px;"></div>
                            </div>
                            <div class="device-actions">
                                <button class="btn-edit" onclick="event.stopPropagation(); openModal('edit', '${id}', '${data.nomeTela}')">✏️ Editar</button>
                                <button class="btn-ghost" onclick="event.stopPropagation(); toggleStatus('${id}', ${data.ativo})">
                                    ${data.ativo ? "Pausar" : "Ativar"}
                                </button>
                                <button class="btn-danger" onclick="event.stopPropagation(); deleteDevice('${id}')">🗑️</button>
                            </div>
                        `;
                        list.appendChild(item);
                        startTerminalMonitoring(uid, id);
                    });
                });
        }

        function startTerminalMonitoring(uid, deviceId) {
            const LIMITE_INATIVIDADE = 2 * 60 * 1000;
            if (activeListeners[deviceId]) database.ref(`exibicoes/${uid}/${deviceId}`).off();

            activeListeners[deviceId] = database.ref(`exibicoes/${uid}/${deviceId}`).on('value', snap => {
                const logsRaw = snap.val();
                let isOnline = false;
                let lastTimeLabel = "Sem registros";

                if (logsRaw) {
                    const logsTratados = Object.values(logsRaw)
                        .map(l => {
                            let ts = Number(l.timestamp);
                            if (isNaN(ts) && l.timestamp) ts = new Date(l.timestamp).getTime();
                            if (ts > 0 && ts < 1e12) ts = ts * 1000;
                            return ts;
                        })
                        .filter(ts => !isNaN(ts) && ts > 0)
                        .sort((a, b) => b - a);

                    if (logsTratados.length > 0) {
                        const ultimoTimestamp = logsTratados[0];
                        const agora = Date.now();
                        isOnline = (agora - ultimoTimestamp) < LIMITE_INATIVIDADE;
                        lastTimeLabel = new Date(ultimoTimestamp).toLocaleTimeString();
                    }
                }

                const dot = document.getElementById(`dot-${deviceId}`);
                const txt = document.getElementById(`text-${deviceId}`);
                const sync = document.getElementById(`sync-${deviceId}`);

                if (dot && txt) {
                    dot.className = isOnline ? "conn-dot dot-online" : "conn-dot dot-offline";
                    txt.innerText = isOnline ? "Conectado" : "Desconectado";
                    txt.style.color = isOnline ? "var(--online)" : "var(--offline)";
                    sync.innerText = `Último sinal: ${lastTimeLabel}`;
                }

                terminalStatus[deviceId] = isOnline;
                recalculateHealth();
            });
        }

        function recalculateHealth() {
            const statuses = Object.values(terminalStatus);
            const total = statuses.length;
            const online = statuses.filter(s => s === true).length;
            updateHealthUI(online, total);
        }

        function updateHealthUI(online, total) {
            const percent = total > 0 ? Math.round((online / total) * 100) : 0;
            const elPercent = document.getElementById('healthPercentage');
            const elDetails = document.getElementById('healthDetails');

            if (elPercent) elPercent.innerText = percent + "%";
            if (elDetails) elDetails.innerText = `${online} de ${total} terminais online`;

            if (healthChart) {
                healthChart.data.datasets[0].data = [online, total - online];
                healthChart.update();
            }
        }

        function openModal(type, id = null, nome = '') {
            const modal = document.getElementById('deviceModal');
            document.getElementById('editDeviceId').value = id;
            document.getElementById('nomeTela').value = nome;

            if (type === 'edit') {
                document.getElementById('modalTitle').innerText = "Editar Nome";
                document.getElementById('modoContainer').style.display = 'none';
            } else {
                document.getElementById('modalTitle').innerText = "Novo Terminal";
                document.getElementById('modoContainer').style.display = 'block';
                document.getElementById('nomeTela').value = "";
            }
            modal.style.display = 'block';
        }

        function closeModal() {
            document.getElementById('deviceModal').style.display = 'none';
        }

        async function saveDevice() {
            const uid = auth.currentUser.uid;
            const id = document.getElementById('editDeviceId').value;
            const nome = document.getElementById('nomeTela').value;
            const modo = document.getElementById('modo').value;

            if (!nome) return alert("Preencha o nome!");
            const docRef = firestore.collection("usuarios").doc(uid).collection("dispositivos");

            try {
                if (id) {
                    await docRef.doc(id).update({
                        nomeTela: nome
                    });
                } else {
                    await docRef.add({
                        nomeTela: nome,
                        modo: modo,
                        ativo: true,
                        lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
                        midias: [],
                        frases: [],
                        grupos: [],
                        criadoEm: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                closeModal();
            } catch (e) {
                alert("Erro na operação.");
            }
        }

        function toggleStatus(id, status) {
            firestore.collection("usuarios").doc(auth.currentUser.uid).collection("dispositivos").doc(id).update({
                ativo: !status
            });
        }

        function deleteDevice(id) {
            if (confirm("Excluir definitivamente?")) {
                firestore.collection("usuarios").doc(auth.currentUser.uid).collection("dispositivos").doc(id).delete();
                if (activeListeners[id]) database.ref(`exibicoes/${auth.currentUser.uid}/${id}`).off();
                delete terminalStatus[id];
            }
        }

        window.onclick = function(event) {
            if (event.target.className === 'modal') {
                closeModal();
                closeMenuModal();
            }
        }
    </script>
</body>

</html>
