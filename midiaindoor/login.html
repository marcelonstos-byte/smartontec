<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Login | Smart Mídia On</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
         :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --accent: #60a5fa;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.98);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --whatsapp: #22c55e;
            --error-text: #b91c1c;
        }
        
        * {
            box-sizing: border-box;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.15) 0, transparent 50%), radial-gradient(at 100% 100%, rgba(96, 165, 250, 0.1) 0, transparent 50%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            overflow: hidden;
        }
        
        .login-box {
            background: var(--glass);
            padding: 2.5rem;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
            animation: slideUp 0.6s ease-out;
            position: relative;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .screen-icon {
            width: 54px;
            height: 40px;
            border: 3px solid var(--primary);
            border-radius: 8px;
            margin: 0 auto 1.2rem;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(37, 99, 235, 0.05);
        }
        
        .screen-icon::after {
            content: "";
            position: absolute;
            width: 18px;
            height: 4px;
            background: var(--primary);
            bottom: -8px;
            border-radius: 2px;
        }
        
        .screen-icon span {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 2px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.4;
                transform: scale(1.15);
            }
        }
        
        h2 {
            margin: 0;
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }
        
        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin: 0.4rem 0 1.8rem;
            font-weight: 400;
        }
        
        .input-wrapper {
            text-align: left;
            margin-bottom: 1.2rem;
            position: relative;
        }
        
        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
            display: block;
            margin-bottom: 6px;
            margin-left: 4px;
        }
        
        input {
            width: 100%;
            padding: 13px 16px;
            border-radius: 14px;
            border: 2px solid #f1f5f9;
            outline: none;
            font-size: 1rem;
            background: #f8fafc;
            color: var(--text-main);
        }
        
        input:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
        }
        
        .forgot-pass {
            display: block;
            text-align: right;
            font-size: 0.8rem;
            color: var(--primary);
            text-decoration: none;
            margin-top: 5px;
            font-weight: 500;
            cursor: pointer;
        }
        
        .forgot-pass:hover {
            text-decoration: underline;
        }
        
        .main-btn {
            width: 100%;
            padding: 15px;
            border: 0;
            border-radius: 14px;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }
        
        .main-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }
        
        .secondary-btn {
            background: transparent;
            color: var(--primary);
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1.5rem;
            padding: 8px 16px;
        }
        
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }
        
        .modal-content {
            background: #fff;
            width: 100%;
            max-width: 440px;
            padding: 2.5rem;
            border-radius: 28px;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        
        .close-modal {
            position: absolute;
            top: 20px;
            right: 24px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #94a3b8;
        }
        
        .modal-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            display: block;
        }
        
        .whatsapp-btn {
            background: var(--whatsapp);
            color: white;
            padding: 14px;
            border-radius: 14px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-top: 1.2rem;
            gap: 10px;
        }
        
        .whatsapp-btn:hover {
            background: #16a34a;
            transform: translateY(-1px);
        }
        
        .status-msg {
            margin-top: 1rem;
            font-size: 0.85rem;
            min-height: 20px;
            font-weight: 500;
        }
        
        .error {
            color: var(--error-text);
        }
        
        .success {
            color: #16a34a;
        }
        
        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 15px auto;
        }
        
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        
        .footer {
            position: absolute;
            bottom: 24px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            width: 100%;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <div class="screen-icon"><span></span></div>
        <h2>Mídia Indoor</h2>
        <p class="subtitle">Smart Mídia On • Gestão de Conteúdo</p>

        <div class="input-wrapper">
            <label for="email">E-mail Corporativo</label>
            <input id="email" type="email" placeholder="nome@empresa.com" />
        </div>

        <div class="input-wrapper" style="margin-bottom: 0.5rem;">
            <label for="password">Senha de Acesso</label>
            <input id="password" type="password" placeholder="••••••••" />
            <a class="forgot-pass" onclick="resetPassword()">Esqueci minha senha</a>
        </div>

        <button id="btnLogin" class="main-btn" onclick="login()">Entrar no Painel</button>

        <div id="loader" class="loader"></div>
        <div id="errorMsg" class="status-msg"></div>

        <button class="secondary-btn" onclick="toggleModal('registerModal', true)">Não tem conta? Solicite acesso</button>
    </div>

    <div id="registerModal" class="modal-overlay">
        <div class="modal-content" style="text-align: left;">
            <span class="close-modal" onclick="toggleModal('registerModal', false)">&times;</span>
            <h3 style="margin: 0 0 0.4rem; font-size: 1.5rem;">Novo Acesso</h3>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;">Preencha para iniciar sua ativação.</p>

            <div class="input-wrapper">
                <label>Nome ou Razão Social</label>
                <input id="regNome" type="text" placeholder="Como devemos te chamar?" />
            </div>

            <div style="display: grid; grid-template-columns: 1.2fr 1fr; gap: 12px;">
                <div class="input-wrapper">
                    <label>Cidade</label>
                    <input id="regCidade" type="text" placeholder="Sua cidade" />
                </div>
                <div class="input-wrapper">
                    <label>WhatsApp</label>
                    <input id="regWhats" type="tel" placeholder="(00) 00000-0000" maxlength="15" />
                </div>
            </div>

            <div class="input-wrapper">
                <label>E-mail de Trabalho</label>
                <input id="regEmail" type="email" placeholder="exemplo@empresa.com" />
            </div>

            <div class="input-wrapper">
                <label>Crie uma Senha</label>
                <input id="regSenha" type="password" placeholder="Mínimo 6 caracteres" />
            </div>

            <button onclick="handleRegister()" id="btnReg" class="main-btn">Finalizar e Solicitar Ativação</button>
            <div id="regLoader" class="loader"></div>
            <div id="regStatus" class="status-msg"></div>
        </div>
    </div>

    <div id="infoModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="toggleModal('infoModal', false)">&times;</span>
            <span id="infoIcon" class="modal-icon">⚠️</span>
            <h3 id="infoTitle" style="margin: 0 0 0.8rem; font-size: 1.5rem;">Aviso</h3>
            <p id="infoText" style="color: var(--text-muted); font-size: 1rem; line-height: 1.5; margin-bottom: 1.5rem;">Mensagem.</p>

            <a id="infoWaLink" href="#" target="_blank" class="whatsapp-btn">
                Contatar Suporte (WhatsApp)
            </a>

            <button class="secondary-btn" style="margin-top: 1rem;" onclick="toggleModal('infoModal', false)">Voltar para o Login</button>
        </div>
    </div>

    <div class="footer">SMART ON &copy; 2026</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDiTbWSlcKpsPEtEzPkSU0jHZkfcAg5fNU",
            authDomain: "newsmartonapp.firebaseapp.com",
            projectId: "newsmartonapp",
            storageBucket: "newsmartonapp.firebasestorage.app",
            messagingSenderId: "1096968028299",
            appId: "1:1096968028299:web:f3a9e48db108afbbb7548e"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Máscara WhatsApp
        document.getElementById('regWhats').addEventListener('input', (e) => {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
            e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
        });

        function toggleModal(id, show) {
            document.getElementById(id).style.display = show ? 'flex' : 'none';
        }

        function showStatusModal(title, text, icon, customMsg = "") {
            document.getElementById('infoTitle').textContent = title;
            document.getElementById('infoText').textContent = text;
            document.getElementById('infoIcon').textContent = icon;

            const waLink = document.getElementById('infoWaLink');
            const encodedText = encodeURIComponent(customMsg || "Olá! Preciso de ajuda com minha conta no Smart Mídia.");
            waLink.href = `https://wa.me/5500000000000?text=${encodedText}`;

            toggleModal('registerModal', false);
            toggleModal('infoModal', true);
        }

        const showLoading = (on, isReg = false) => {
            document.getElementById(isReg ? 'regLoader' : 'loader').style.display = on ? 'block' : 'none';
            document.getElementById(isReg ? 'btnReg' : 'btnLogin').style.display = on ? 'none' : 'block';
        };

        // --- NOVA FUNÇÃO: RESET DE SENHA ---
        async function resetPassword() {
            const email = document.getElementById('email').value.trim();
            const errorBox = document.getElementById('errorMsg');
            errorBox.textContent = '';

            if (!email) {
                errorBox.className = "status-msg error";
                errorBox.textContent = 'Digite seu e-mail acima primeiro.';
                return;
            }

            showLoading(true);
            try {
                await auth.sendPasswordResetEmail(email);
                errorBox.className = "status-msg success";
                errorBox.textContent = 'E-mail de redefinição enviado! Verifique sua caixa de entrada.';
            } catch (err) {
                errorBox.className = "status-msg error";
                if (err.code === 'auth/user-not-found') {
                    errorBox.textContent = 'E-mail não cadastrado em nossa base.';
                } else {
                    errorBox.textContent = 'Erro ao enviar e-mail. Tente novamente mais tarde.';
                }
            } finally {
                showLoading(false);
            }
        }

        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorBox = document.getElementById('errorMsg');
            errorBox.textContent = '';

            if (!email || !password) {
                errorBox.className = "status-msg error";
                errorBox.textContent = 'Informe e-mail e senha.';
                return;
            }

            showLoading(true);
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;

                try {
                    const userDoc = await db.collection('usuarios').doc(user.uid).get();

                    if (userDoc.exists) {
                        const userData = userDoc.data();
                        if (userData.status === true) {
                            await db.collection('usuarios').doc(user.uid).update({
                                ultimoLogin: firebase.firestore.FieldValue.serverTimestamp()
                            });
                            window.location.href = "terminais.html";
                        } else {
                            throw new Error("INACTIVE_USER");
                        }
                    } else {
                        throw new Error("USER_NOT_FOUND");
                    }
                } catch (fsError) {
                    if (fsError.code === 'permission-denied' || fsError.message === "INACTIVE_USER") {
                        await auth.signOut();
                        showStatusModal(
                            "Conta Inativa",
                            "Seu acesso está pendente de ativação. Por gentileza, contate o suporte.",
                            "⚠️",
                            `Olá! Tentei acessar minha conta (${email}) mas ela consta como inativa. Gostaria de solicitar a ativação.`
                        );
                    } else {
                        throw fsError;
                    }
                }
            } catch (err) {
                if (err.message !== "INACTIVE_USER") {
                    errorBox.className = "status-msg error";
                    errorBox.textContent = "E-mail ou senha incorretos ou erro de conexão.";
                }
            } finally {
                showLoading(false);
            }
        }

        async function handleRegister() {
            const nome = document.getElementById('regNome').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const senha = document.getElementById('regSenha').value.trim();
            const whats = document.getElementById('regWhats').value.trim();
            const cidade = document.getElementById('regCidade').value.trim();
            const statusBox = document.getElementById('regStatus');

            if (!nome || !email || !senha || !whats) {
                statusBox.textContent = "Preencha todos os campos obrigatórios!";
                statusBox.className = "status-msg error";
                return;
            }

            showLoading(true, true);
            try {
                const cred = await auth.createUserWithEmailAndPassword(email, senha);

                await db.collection('usuarios').doc(cred.user.uid).set({
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    email: email,
                    limitedetelas: 1,
                    nome: nome,
                    ultimoLogin: firebase.firestore.FieldValue.serverTimestamp(),
                    whatsapp: whats,
                    cidade: cidade,
                    status: false // Por padrão criado como inativo
                });

                await auth.signOut();

                showStatusModal(
                    "Sucesso! 🚀",
                    "Conta criada! Agora nossa equipe precisa ativar seu acesso para você entrar no painel.",
                    "✅",
                    `Olá! Acabei de criar minha conta no Smart Mídia (${email}) e gostaria de solicitar a ativação do meu acesso.`
                );

                document.getElementById('regNome').value = "";
                document.getElementById('regEmail').value = "";
                document.getElementById('regSenha').value = "";
                document.getElementById('regWhats').value = "";
                document.getElementById('regCidade').value = "";

            } catch (e) {
                statusBox.textContent = "Erro ao cadastrar: E-mail em uso ou senha curta.";
                statusBox.className = "status-msg error";
            } finally {
                showLoading(false, true);
            }
        }
    </script>
</body>

</html>
