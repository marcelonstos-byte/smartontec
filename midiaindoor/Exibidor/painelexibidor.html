<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel de Exibição</title>

    <!-- Firebase (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

    <style>
        /* ===== Reset / Base ===== */
        
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background: #000;
            overflow: hidden;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }
        /* ===== Layout ===== */
        
        #wrapper {
            display: flex;
            width: 100vw;
            height: 100vh;
            flex-direction: row;
            transition: all 0.5s ease-in-out;
        }
        
        body.rotated #wrapper {
            flex-direction: column;
            transform: rotate(90deg) translateY(-100%);
            transform-origin: top left;
            width: 100vh;
            height: 100vw;
            position: absolute;
        }
        
        #superior {
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            flex: 1;
            background: #000;
        }
        /* ===== Rodapé ===== */
        /* ===== ESTILO BASE (Comum aos dois modos) ===== */
        
        .rodape {
            background: #fff;
            display: flex;
            align-items: center;
            padding: 1rem;
            color: #333;
            font-weight: 500;
            font-size: 1.1rem;
            box-sizing: border-box;
            z-index: 999;
        }
        /* ===== MODO PAISAGEM (Horizontal) ===== */
        
        body:not(.rotated) .rodape {
            height: 60px;
            width: 100vw;
            position: absolute;
            bottom: 0;
            left: 0;
            flex-direction: row;
            /* Itens em linha */
            justify-content: space-between;
        }
        /* Garante que Logo e Frase fiquem lado a lado no modo horizontal */
        
        body:not(.rotated) .rodape>div:first-child {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 15px;
            /* Espaço entre a logo e o texto */
        }
        
        body:not(.rotated) .info {
            flex-direction: row;
            /* Data e Clima lado a lado se preferir, ou manter column */
            gap: 20px;
            align-items: center;
            display: flex !important;
            flex-direction: column !important;
            align-items: flex-end !important;
            /* Isso encosta o conteúdo na direita */
            gap: 02px;
            width: 92%;
            /* Garante que o bloco use toda a largura da barra para alinhar */
        }
        /* ===== MODO TOTEM (Vertical) ===== */
        
        body.rotated .rodape {
            width: 55px;
            /* Ajustado para caber melhor o conteúdo vertical */
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            flex-direction: column;
            /* Itens em coluna */
            justify-content: flex-start;
            /* Alinha tudo no topo inicialmente */
            align-items: center;
            padding: 20px 0;
        }
        /* Gira os textos apenas no modo vertical */
        
        body.rotated .fraseRodape {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            margin-top: 30px;
            /* Espaço após a logo */
            white-space: nowrap;
            gap: 10px;
            width: 68%;
        }
        /* Empurra o bloco de info para o fim da tela */
        
        body.rotated .info {
            margin-top: auto;
            /* Mantém no fim da tela */
            writing-mode: vertical-rl;
            text-orientation: mixed;
            /* Alinhamento horizontal dentro da barra */
            display: flex !important;
            flex-direction: column !important;
            align-items: flex-end !important;
            /* Isso encosta o conteúdo na direita */
            gap: 02px;
            width: 92%;
            /* Garante que o bloco use toda a largura da barra para alinhar */
        }
        /* ===== AJUSTES GERAIS ===== */
        
        .fraseRodape,
        .info {
            white-space: nowrap;
        }
        
        #logoExibidor {
            display: block;
            max-height: 100%;
            object-fit: contain;
        }
        /* Rotação da logo no modo totem */
        
        body.rotated #logoExibidor {
            transform: rotate(90deg);
        }
        /* ===== Mídias ===== */
        
        .texto {
            background: transparent;
            color: #fff;
            font-size: 2rem;
            padding: 2rem;
            white-space: pre-wrap;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            text-align: left;
            line-height: 1.5;
            overflow: auto;
        }
        
        .imagem,
        .video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .fade {
            opacity: 0;
            transition: opacity 1s;
            position: absolute;
            width: 100%;
            height: 100%;
        }
        
        .active {
            opacity: 1;
            z-index: 1;
        }
        /* ===== Responsividade #superior ===== */
        
        #superior {
            position: relative;
            overflow: hidden;
        }
        
        #superior>* {
            position: absolute !important;
            inset: 0;
            width: 100% !important;
            height: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
            display: block !important;
        }
        
        #superior img,
        #superior video,
        #superior iframe,
        #superior .imagem,
        #superior .video,
        #superior .texto,
        #superior .fade {
            width: 100% !important;
            height: 100% !important;
            max-width: none !important;
            max-height: none !important;
            box-sizing: border-box !important;
        }
        
        #superior img,
        #superior video,
        #superior .imagem,
        #superior .video {
            object-fit: cover !important;
            object-position: center center !important;
        }
        
        #superior iframe {
            width: 100% !important;
            height: 100% !important;
            transform-origin: center center;
            border: 0;
        }
        
        #superior .texto {
            padding: 2rem !important;
            overflow: auto !important;
            background: transparent !important;
            color: #fff !important;
        }
        
        #superior .fade {
            transition: opacity 1s !important;
            will-change: opacity;
        }
        
        body.rotated #superior>* {
            position: absolute !important;
            inset: 0;
            width: 100% !important;
            height: 100% !important;
        }
        /* ===== Overlay de Carregamento ===== */
        
        #carregandoOverlay {
            position: fixed;
            inset: 0;
            background: #0c0c0c;
            display: flex;
            opacity: 1;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            color: #e0e6ed;
            font-family: "Roboto Mono", "Consolas", monospace;
            text-align: center;
            /* animações */
            transition: transform 0.5s ease, opacity 0.9s ease;
            will-change: transform, opacity;
        }
        /* Overlay também respeita orientação */
        
        body.rotated #carregandoOverlay {
            transform: rotate(90deg) translateY(-100%);
            transform-origin: top left;
            width: 100vh;
            height: 100vw;
        }
        
        #logoCarregando {
            width: 420px;
            margin-bottom: 28px;
            opacity: 0.98;
            transition: opacity 0.8s ease;
        }
        
        #logoCarregando {
            width: 420px;
            margin-bottom: 28px;
            opacity: 0.98;
            transition: opacity 0.8s ease;
        }
        
        body.rotated #logoExibidor {
            /* Gira o logo 90 graus */
            /* Adicionamos o translateY para subir o logo 0.25 polegadas */
            transform: rotate(90deg) translateY(-0.30in);
            /* Mantém o ponto de rotação centralizado */
            transform-origin: center center;
            /* Ajustes de layout existentes */
            display: block;
            margin-right: 0;
            margin-top: 12px;
        }
        /* Quando a tela está em modo Totem (Deitada) */
        /* Container que ocupa a altura toda da tela */
        
        body.rotated .rodape {
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            height: 100vh !important;
            /* Altura total da tela */
            padding: 20px 0 !important;
            /* Respiro nas bordas superior e inferior */
        }
        /* A frase fica no topo */
        
        body.rotated #fraseRodape {
            writing-mode: vertical-rl !important;
            white-space: nowrap !important;
        }
        /* O bloco de baixo (Data e Clima) */
        
        body.rotated #infoRodape {
            margin-top: auto !important;
            /* EMPURRA TUDO PARA O FINAL DA TELA */
            writing-mode: vertical-rl !important;
            white-space: nowrap !important;
        }
        
        body.rotated #cidadeClima {
            writing-mode: vertical-rl !important;
            white-space: nowrap !important;
            margin-top: 15px !important;
            /* Distância entre data e clima */
        }
        /* Ajuste da Logo na rotação */
        
        body.rotated #logoExibidor {
            transform: rotate(90deg);
            margin-right: 0 !important;
            margin-bottom: 15px !important;
        }
        
        .brilho {
            animation: brilho 2.2s ease-in-out infinite;
        }
        
        @keyframes brilho {
            0%,
            100% {
                opacity: 0.75;
            }
            50% {
                opacity: 1;
            }
        }
        
        .pontos {
            display: inline-block;
            width: auto;
            height: 2em;
            text-align: left;
            position: relative;
            margin-right: 8px;
            letter-spacing: -8px;
        }
        
        .pontos .dot {
            position: relative;
            font-size: 2rem;
            line-height: 1;
            opacity: 0;
            transition: opacity 120ms linear;
            color: #9fded6;
        }
        
        .fadeOutShort {
            opacity: 0 !important;
            transition: opacity 360ms ease;
        }
        
        #carregandoTexto {
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        #frases {
            font-size: 1.6rem;
        }
        /* =========================================================
           MODAL DEVICE ID  — estilo baseado no padrão #uidModal
        ========================================================= */
        
        #deviceModal {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100000;
            background: rgba(0, 0, 0, 0.72);
            /* fundo mais escuro p/ destaque */
            visibility: hidden;
            opacity: 0;
            transition: opacity 220ms ease, visibility 220ms;
            pointer-events: none;
        }
        
        #deviceModal.show {
            visibility: visible;
            opacity: 1;
            pointer-events: auto;
        }
        /* Caixa central */
        
        #deviceModal .box {
            background: #111418;
            color: #fff;
            padding: 36px 32px 28px;
            border-radius: 16px;
            width: min(480px, 92%);
            /* mais compacto — estilo uidModal */
            box-shadow: 0 16px 56px rgba(0, 0, 0, 0.75), 0 0 0 1px rgba(255, 255, 255, 0.07);
            /* borda sutil */
            text-align: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            animation: modalSlideIn 220ms ease;
        }
        
        @keyframes modalSlideIn {
            from {
                transform: translateY(-18px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        /* Ícone decorativo no topo */
        
        #deviceModal .modal-icon {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(255, 106, 0, 0.15);
            border: 1.5px solid rgba(255, 106, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto 18px;
        }
        
        #deviceModal h2 {
            margin: 0 0 8px;
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }
        
        #deviceModal p {
            margin: 0 0 22px;
            color: #9ba8b4;
            font-size: 0.92rem;
            line-height: 1.5;
        }
        /* Input */
        
        #deviceModal input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            font-size: 1rem;
            border-radius: 10px;
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 20px;
            transition: border-color 180ms, background 180ms;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #deviceModal input[type="text"]::placeholder {
            color: #5a6674;
        }
        
        #deviceModal input[type="text"]:focus {
            border-color: rgba(255, 106, 0, 0.7);
            background: rgba(255, 106, 0, 0.04);
        }
        
        #deviceIdInput::placeholder {
            color: #5a6674;
        }
        
        #deviceIdInput:focus {
            border-color: rgba(255, 106, 0, 0.7);
            background: rgba(255, 106, 0, 0.04);
        }
        /* Botões */
        
        #deviceButtons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .btn {
            padding: 11px 22px;
            border-radius: 10px;
            font-size: 0.93rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: opacity 150ms, transform 120ms;
        }
        
        .btn:active {
            transform: scale(0.97);
        }
        /* Cancelar primeiro — padrão do uidModal */
        
        .btn.ghost {
            background: rgba(255, 255, 255, 0.06);
            color: #b0bac5;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .btn.ghost:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .btn.primary {
            background: #ff6a00;
            color: #fff;
        }
        
        .btn.primary:hover {
            opacity: 0.88;
        }
        /* Rodapé do modal — dica de teclado */
        
        #deviceModal .modal-hint {
            margin-top: 18px;
            font-size: 0.78rem;
            color: #3e4a55;
        }
        
        #deviceModal .modal-hint kbd {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 4px;
            padding: 1px 6px;
            font-size: 0.75rem;
            font-family: monospace;
        }
        
        #container-principal {
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #000;
        }
        /* Isso força o conteúdo a se ajustar ao tamanho da tela mantendo a proporção */
        
        .fade.active>div {
            transform-origin: center center;
            zoom: 1;
            /* Uma forma simples, ou use transform: scale() */
        }
    </style>
</head>

<script>
(function(){

let escala = parseFloat(localStorage.getItem("painel_escala")) || 1;
let fonte = parseFloat(localStorage.getItem("painel_fonte")) || 1;

const wrapper = document.getElementById("wrapper");

function aplicarEscala(){
    if(!wrapper) return;

    wrapper.style.transformOrigin = "center center";
    wrapper.style.transform = `scale(${escala})`;

    document.documentElement.style.fontSize = (fonte*100) + "%";

    localStorage.setItem("painel_escala", escala);
    localStorage.setItem("painel_fonte", fonte);
}

aplicarEscala();

document.addEventListener("keydown",(e)=>{

    const tag = (document.activeElement && document.activeElement.tagName) || "";
    if(tag==="INPUT" || tag==="TEXTAREA") return;

    // RESET
    if(e.key==="0"){
        escala=1;
        fonte=1;
        aplicarEscala();
    }

    // AUMENTAR TELA
    if(!e.shiftKey && (e.key==="+" || e.key==="=")){
        escala+=0.05;
        aplicarEscala();
    }

    // DIMINUIR TELA
    if(!e.shiftKey && e.key==="-" ){
        escala=Math.max(0.5,escala-0.05);
        aplicarEscala();
    }

    // AUMENTAR FONTE
    if(e.shiftKey && (e.key==="+" || e.key==="=")){
        fonte+=0.05;
        aplicarEscala();
    }

    // DIMINUIR FONTE
    if(e.shiftKey && e.key==="-" ){
        fonte=Math.max(0.6,fonte-0.05);
        aplicarEscala();
    }

});

})();
</script>

<body>

    <!-- =====================================================================
         SCRIPT PRINCIPAL
    ====================================================================== -->
    <script>
        /* ---------- Firebase ---------- */
        const firebaseConfig = {
            apiKey: "AIzaSyDiTbWSlcKpsPEtEzPkSU0jHZkfcAg5fNU",
            authDomain: "newsmartonapp.firebaseapp.com",
            projectId: "newsmartonapp",
            databaseURL: "https://newsmartonapp-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const rtdb = firebase.database();

        /* ---------- Globals ---------- */
        var currentUid = localStorage.getItem("painelUid") || null;
        var deviceId = localStorage.getItem("painelDeviceId") || null;
        var devicePath = localStorage.getItem("painelDevicePath") || null;
        var cidadeTerminal = "Brasil";
        /* ===================================================
            ORIENTAÇÃO
         =================================================== */
        function aplicarOrientacao(orientacao) {
            document.body.classList.toggle("rotated", orientacao === "landscape");
            try {
                localStorage.setItem('painel_orientacao', orientacao);
            } catch (_) {}
        }

        async function carregarOrientacao(uid, devId) {
            try {
                if (!uid || !devId) {
                    const saved = localStorage.getItem('painel_orientacao');
                    if (saved) aplicarOrientacao(saved);
                    return;
                }
                const snap = await rtdb
                    .ref(`usuarios/${uid}/dispositivos/${devId}/config/orientacao`)
                    .once("value");
                const v = snap.val();
                aplicarOrientacao(v || localStorage.getItem('painel_orientacao') || 'portrait');
            } catch (e) {
                console.warn("Erro ao carregar orientação:", e);
            }
        }

        /* ===================================================
            CARREGAR DADOS
         =================================================== */
        async function carregarDados(colecao) {
            console.log("devicePath usado:", devicePath);

            if (!devicePath) {
                console.warn('carregarDados: devicePath ausente.', colecao);
                return [];
            }

            try {
                const snap = await db.doc(devicePath).get();

                if (!snap.exists) {
                    console.warn('Dispositivo não encontrado:', deviceId);
                    return [];
                }

                const data = snap.data() || {};
                console.log("DADOS DO DOCUMENTO:", data);

                // ✅ AQUI É O LUGAR CERTO:
                // Aplicar estilos assim que os dados chegam, antes dos "returns"
                if (data.config) {
                    aplicarEstilos(data.config);
                }

                if (colecao === 'midias') {
                    return (data.midias || [])
                        .filter(m => m.ativo !== false)
                        .sort((a, b) => (Number(a.ordem) || 0) - (Number(b.ordem) || 0));
                }

                if (colecao === 'fraseRodape') {
                    return (data.fraseRodape || []).map(f => ({
                        texto: f
                    }));
                }

                return [];

            } catch (err) {
                console.warn('Erro Firestore:', err);
                return [];
            }
        }
        /* ===================================================
            REGISTRAR EXIBIÇÃO
         =================================================== */
        function registrarExibicaoSafe(item, ordem) {

            if (!currentUid || !deviceId) return;

            rtdb.ref(`exibicoes/${currentUid}/${deviceId}`)
                .push({
                    timestamp: new Date().toISOString(),
                    tipo: item.tipo || 'desconhecido',
                    conteudo: (item.nome || item.url || item.imagem || '').slice(0, 120),
                    ordem
                })
                .catch(e => console.warn('registrarExibicao erro:', e));
        }

        function aplicarEscalaMenu() {
            const menu = document.querySelector('.menu-dinamico-container');
            if (!menu) return;

            const larguraTela = window.innerWidth;
            const alturaTela = window.innerHeight;

            // Calcula a escala baseada na largura de 1920px
            // Isso garante que o menu sempre caiba na largura da TV
            const escala = larguraTela / 1920;

            // Aplica a escala e mantém o elemento centralizado
            menu.style.transform = `translate(-50%, -50%) scale(${escala})`;
        }

        // Escuta o redimensionamento da janela (opcional para TVs, mas bom para testes)
        window.addEventListener('resize', aplicarEscalaMenu);

        /* ===================================================
                 CARROSSEL
         =================================================== */
        // Variável global para permitir que o timer seja limpo externamente se necessário
        let timerGlobalCarrossel = null;

        async function iniciarCarrossel(colecao, containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;

            // Limpa qualquer execução anterior antes de começar uma nova
            if (timerGlobalCarrossel) clearTimeout(timerGlobalCarrossel);

            const itens = await carregarDados(colecao);

            // --- (Função Interna: Gerador de Slides) ---
            function gerarEmbedSlidesFromUrl(u, ms = 12000) {
                if (!u) return null;
                try {
                    if (/\/presentation\/d\/(e\/)?[^/]+\/embed/i.test(u)) return u;
                    if (u.includes('/pub')) {
                        const url = new URL(u);
                        if (!url.searchParams.has('start')) url.searchParams.set('start', 'true');
                        if (!url.searchParams.has('loop')) url.searchParams.set('loop', 'true');
                        if (!url.searchParams.has('delayms')) url.searchParams.set('delayms', String(ms));
                        url.pathname = url.pathname.replace(/\/pub$/i, '/embed');
                        return url.toString();
                    }
                    let m = u.match(/\/d\/e\/([a-zA-Z0-9_-]+)/);
                    if (m) return `https://docs.google.com/presentation/d/e/${m[1]}/embed?start=true&loop=true&delayms=${ms}`;
                    m = u.match(/\/d\/([a-zA-Z0-9_-]+)/);
                    if (m) return `https://docs.google.com/presentation/d/${m[1]}/embed?start=true&loop=true&delayms=${ms}`;
                } catch (e) {
                    console.warn('gerarEmbed erro', e);
                }
                return null;
            }

                    if (item.url) menuContainer.appendChild(criarCamada(`<img src="${item.url}" style="width:450px; display:block;">`, item.pos_desc));

                    const v = document.createElement('video');

function validarAgenda(item) {
    // Se não tem agenda (mídias antigas ou sem restrição), exibe sempre
    if (!item.agenda) return true;

    const agora = new Date();
    const hoje = agora.toISOString().split('T')[0];
    const diaSemana = agora.getDay(); // 0 (Dom) a 6 (Sáb)
    const horaAtualMinutos = (agora.getHours() * 60) + agora.getMinutes();

    const a = item.agenda;

    // 1. Validar Intervalo de Datas
    if (a.dataInicio && hoje < a.dataInicio) return false;
    if (a.dataFim && hoje > a.dataFim) return false;

    // 2. Validar Dias da Semana
    if (a.dias && Array.isArray(a.dias) && a.dias.length > 0) {
        if (!a.dias.includes(diaSemana)) return false;
    }

    // 3. Validar Horário
    const [hI, mI] = (a.horaInicio || "00:00").split(':').map(Number);
    const [hF, mF] = (a.horaFim || "23:59").split(':').map(Number);
    
    const minInicio = (hI * 60) + mI;
    const minFim = (hF * 60) + mF;

    if (horaAtualMinutos < minInicio || horaAtualMinutos > minFim) return false;

    return true; // Passou em todos os filtros
}

            // --- (NOVIDADE: Agendador de Sincronismo Relógio Real) ---

                const agora = new Date();

            }
        }



        /* ---------- 3. Lógica de Autenticação (Manual via Modal) ---------- */
        async function iniciarPeloDeviceId() {
            const nomeConta = accountNameInput.value.trim();
            const idPainel = deviceIdInput.value.trim();

            if (!nomeConta || !idPainel) {
                alert("Preencha todos os campos.");
                return;
            }

            try {
                btnConfirmModal.disabled = true;
                btnConfirmModal.innerText = "Conectando...";

                const usersSnapshot = await db.collection("usuarios")
                    .where("nome", "==", nomeConta)
                    .get();

                if (usersSnapshot.empty) {
                    alert(`Conta "${nomeConta}" não encontrada.`);
                    return;
                }

                let vinculoSucesso = false;

                for (const userDoc of usersSnapshot.docs) {
                    const uidCandidato = userDoc.id;
                    const deviceRef = db.collection("usuarios").doc(uidCandidato)
                        .collection("dispositivos").doc(idPainel);

                    const deviceSnap = await deviceRef.get();

                    if (deviceSnap.exists) {
                        currentUid = uidCandidato;
                        deviceId = idPainel;
                        devicePath = deviceRef.path;
                        vinculoSucesso = true;
                        break;
                    }
                }

                if (vinculoSucesso) {
                    // PERSISTÊNCIA NO STORAGE
                    localStorage.setItem("painelDeviceId", deviceId);
                    localStorage.setItem("painelDevicePath", devicePath);
                    localStorage.setItem("painelUid", currentUid);
                    localStorage.setItem("painelAccountName", nomeConta);

                    console.log("✅ Dados salvos com sucesso.");

                    hideDeviceModal(true);
                    if (typeof startCarregamentofrases === "function") startCarregamentofrases();
                    await inicializarModulosDoPlayer(currentUid, deviceId);
                } else {
                    alert("ID do Painel não reconhecido para esta conta.");
                }

            } catch (error) {
                console.error("❌ Erro na conexão:", error);
                alert("Erro técnico: " + error.message);
            } finally {
                btnConfirmModal.disabled = false;
                btnConfirmModal.innerText = "Confirmar Vinculação";
            }
        }

        /* ---------- 4. Funções de Apoio e Boot ---------- */
        async function inicializarModulosDoPlayer(uid, devId) {
            try {
                // Carregamento sequencial crítico (Orientação define o layout)
                if (typeof carregarOrientacao === "function") {
                    await carregarOrientacao(uid, devId);
                }

                // Carregamento paralelo de funções secundárias
                if (typeof iniciarCarrossel === "function") iniciarCarrossel('midias', 'superior');
                if (typeof carregarfrases === "function") carregarfrases();
                if (typeof escutarComandoRemoto === "function") escutarComandoRemoto();

            } catch (e) {
                console.error("⚠️ Erro ao iniciar módulos do player:", e);
            }
        }

        function showDeviceModal() {
            if (deviceModal) {
                deviceModal.style.display = "flex"; // Restaura o display para o flex do seu CSS
                // O timeout garante que a transição de opacidade do seu CSS funcione
                setTimeout(() => deviceModal.classList.add("show"), 10);
                if (accountNameInput) accountNameInput.focus();
            }
        }

        function hideDeviceModal(imediato = false) {
            if (!deviceModal) return;

            if (imediato) {
                deviceModal.classList.remove("show");
                deviceModal.style.setProperty("display", "none", "important");
            } else {
                deviceModal.classList.remove("show");
                setTimeout(() => {
                    deviceModal.style.setProperty("display", "none", "important");
                }, 300);
            }
        }

        function resetDevice() {
            if (!confirm("Deseja realmente desconectar este painel?")) return;

            // Remove apenas os dados do painel
            localStorage.removeItem("painelDeviceId");
            localStorage.removeItem("painelDevicePath");
            localStorage.removeItem("painelUid");
            localStorage.removeItem("painelAccountName");

            // Zera variáveis globais
            currentUid = null;
            deviceId = null;
            devicePath = null;

            console.warn("🔌 Painel desconectado.");

            // Limpa a tela
            const superior = document.getElementById("superior");
            if (superior) superior.innerHTML = "";

            // Mostra novamente o modal de vinculação
            showDeviceModal();
        }

        /* ---------- 5. Eventos e Inicialização ---------- */
        btnConfirmModal.addEventListener('click', iniciarPeloDeviceId);
        if (btnCancelarModal) btnCancelarModal.addEventListener('click', () => hideDeviceModal());

        [accountNameInput, deviceIdInput].forEach(input => {
            if (input) {
                input.addEventListener('keydown', e => {
                    if (e.key === 'Enter') iniciarPeloDeviceId();
                });
            }
        });


        /* ---------- Animação de Carregamento ---------- */
        function startCarregamentofrases() {
            const frases = [{
                txt: "Iniciando sistema",
                time: 1500
            }, {
                txt: "Estabelecendo Conexão Segura",
                time: 1200
            }, {
                txt: "Sincronizando com Database",
                time: 800
            }, {
                txt: "Atualizando Mídias",
                time: 1200
            }, {
                txt: "Preparando interface",
                time: 1000
            }];

            const frasesEl = document.getElementById("frases");
            const overlay = document.getElementById("carregandoOverlay");
            const dots = ['dot1', 'dot2', 'dot3'].map(id => document.getElementById(id));

            if (!frasesEl || !overlay) return;

            let pi = 0;
            const seq = ["", ".", "..", "..."];
            let pInt = setInterval(() => {
                const cur = seq[Math.floor(Date.now() / 400) % seq.length];
                dots.forEach((d, i) => {
                    if (d) d.style.opacity = i < cur.length ? "1" : "0";
                });
            }, 200);

            function showPhrase(i) {
                if (i >= frases.length) {
                    clearInterval(pInt);
                    frasesEl.textContent = "Painel pronto 🚀";
                    setTimeout(() => {
                        overlay.style.opacity = '0';
                        setTimeout(() => overlay.remove(), 800);
                    }, 800);
                    return;
                }

                frasesEl.textContent = frases[i].txt;
                setTimeout(() => {
                    frasesEl.classList.add('fadeOutShort');
                    setTimeout(() => {
                        frasesEl.classList.remove('fadeOutShort');
                        showPhrase(i + 1);
                    }, 400);
                }, frases[i].time);
            }
            showPhrase(0);
        }
        /* ===================================================
    ESTILOS E PERSONALIZAÇÃO (DINÂMICO)
=================================================== */
        function aplicarEstilos(config) {
            if (!config) return;

            // Helper para converter "true"/true em booleano real
            const isTrue = (val) => val === true || val === "true";

            const rodape = document.querySelector('.rodape');
            const logoExibidor = document.getElementById('logoExibidor');

            // 1. CONTROLE DO RODAPÉ (VISIBILIDADE GERAL)
            if (rodape) {
                if (!isTrue(config.showFooter)) {
                    rodape.style.setProperty('display', 'none', 'important');
                    return; // Interrompe pois o rodapé está oculto
                }

                rodape.style.setProperty('display', 'flex', 'important');

                // 2. COR DE FUNDO (Apenas se o rodapé estiver visível)
                if (config.corFooter) {
                    rodape.style.backgroundColor = config.corFooter;
                }
            }

            // 3. LOGOTIPO DO RODAPÉ
            if (logoExibidor) {
                const mostrarLogo = (isTrue(config.showLogoFooter) && config.logoUrl) ? config.logoUrl.trim() : null;

                if (mostrarLogo) {
                    // Só atualiza o src se for diferente para evitar "piscar" a imagem
                    if (logoExibidor.src !== config.logoUrl) {
                        logoExibidor.src = config.logoUrl;
                    }
                    logoExibidor.style.setProperty('display', 'block', 'important');
                } else {
                    logoExibidor.style.setProperty('display', 'none', 'important');
                    logoExibidor.src = "";
                }
            }

            // 4. CORES DE TEXTO E ÍCONES
            if (config.corFooterText) {
                window.corGlobalPainel = config.corFooterText;

                const seletores = ["#fraseRodape", "#infoRodape", "#cidadeClima", ".info"];
                seletores.forEach(seletor => {
                    const el = document.querySelector(seletor);
                    if (el) el.style.color = config.corFooterText;
                });

                // Opcional: Se você usa ícones SVG ou fontes de ícones, 
                // pode aplicar a cor aqui também.
            }
        }
        /* ===================================================
           AUTO-REFRESH POR MUDANÇA NO DOCUMENTO
        =================================================== */

        // Variável fora da função para persistir entre snapshots
        let ultimaAssinaturaVisual = "";
        let travaProcessamento = false;

        function ativarWatcherDispositivo() {
            if (!devicePath) return;

            console.log("🛠️ Watcher ativado (Estilos + Frases).");

            db.doc(devicePath).onSnapshot({
                includeMetadataChanges: false
            }, async(doc) => {
                if (!doc.exists || travaProcessamento) return;

                const data = doc.data() || {};

                // Assinatura para evitar processamento se nada mudou
                const assinaturaAtual = JSON.stringify({
                    c: data.config || {},
                    // Use exatamente o nome do campo que você usa no Firestore (ex: frases ou fraseRodape)
                    f: data.config.fraseRodape || data.frases || ""
                });

                if (assinaturaAtual === ultimaAssinaturaVisual) return;

                travaProcessamento = true;
                ultimaAssinaturaVisual = assinaturaAtual;

                console.warn("🎨 Mudança detectada no Painel!");

                try {
                    // 1. Atualiza Estilos (Cores/Logos)
                    if (data.config) {
                        aplicarEstilos(data.config);
                    }

                    // 2. ATUALIZA AS FRASES (O segredo está aqui!)
                    // Chamamos a função carregarfrases() que processa a nova lista e troca o texto na tela
                    if (typeof carregarfrases === 'function') {
                        await carregarfrases();
                    }

                } catch (err) {
                    console.error("Erro na atualização parcial:", err);
                } finally {
                    setTimeout(() => {
                        travaProcessamento = false;
                    }, 2000);
                }

                function ajustarEscalaMenu() {
                    const containerRef = document.querySelector('.menu-dinamico-container');
                    if (!containerRef) return;

                    const larguraTela = window.innerWidth;
                    const alturaTela = window.innerHeight;

                    // Calcula a proporção baseada na largura (1920)
                    const escala = larguraTela / 1920;

                    // Aplica a escala e mantém a centralização
                    containerRef.style.transform = `translate(-50%, -50%) scale(${escala})`;
                }

                // Executa ao carregar e ao redimensionar a tela
                window.addEventListener('resize', ajustarEscalaMenu);
                // Como o menu é criado dinamicamente, precisamos chamar a função 
                // logo após o container ser adicionado ao DOM.
            });
        }
    </script>
