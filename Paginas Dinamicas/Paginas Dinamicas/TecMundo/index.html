<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>TecMundo | Últimas Notícias</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html,
        body {
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
        
        #feed {
            position: relative;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: background-image 1.2s cubic-bezier(0.4, 0, 0.2, 1), opacity .8s;
            display: flex;
            align-items: flex-end;
            opacity: 0;
        }
        /* Gradiente escuro para legibilidade tech */
        
        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0.4) 50%, rgba(0, 0, 0, 0.2) 100%), linear-gradient(to right, rgba(0, 0, 0, 0.7) 0%, rgba(0, 0, 0, 0) 100%);
            z-index: 5;
        }
        
        .container {
            position: relative;
            width: 100%;
            padding: 0 6% 100px;
            z-index: 10;
        }
        
        .category-badge {
            display: inline-block;
            background: #126cf3;
            /* Amarelo TecMundo/Voxel */
            color: #000;
            padding: 5px 15px;
            font-size: .9em;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            border-radius: 2px;
        }
        
        .title {
            font-family: 'Playfair Display', serif;
            font-size: 3.8em;
            line-height: 1.05;
            font-weight: 900;
            margin-bottom: 25px;
            max-width: 90%;
            text-shadow: 0 5px 20px rgba(0, 0, 0, 0.8);
        }
        
        .desc {
            font-size: 1.3em;
            line-height: 1.6;
            max-width: 850px;
            opacity: .85;
            font-weight: 300;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .line {
            margin-top: 30px;
            width: 100px;
            height: 5px;
            background: #1687f0;
        }
        
        .logo {
            position: absolute;
            top: 40px;
            right: 50px;
            width: 200px;
            z-index: 100;
            filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.5));
        }
        
        .logo img {
            width: 100%;
            height: auto;
        }
        
        @media(max-width:900px) {
            .title {
                font-size: 2.2em;
            }
            .desc {
                font-size: 1.1em;
            }
            .logo {
                width: 140px;
                right: 30px;
            }
        }
    </style>
</head>

<body>

    <div id="feed">
        <div class="overlay"></div>

        <div class="container">
            <span class="category-badge" id="category">Tech</span>

            <h1 class="title" id="title">Sincronizando notícias...</h1>

            <p class="desc" id="description"></p>
            <div class="line"></div>
        </div>

        <div class="logo">
            <img src="https://tutorti.com.br/portal/wp-content/uploads/2016/04/logo-tecmundo.png" alt="TecMundo">
        </div>
    </div>

    <script>
        (function() {
            const XML_URL = "https://content.scripts.farolsign.com.br/dinamicos/feed/outros/tecmundo";
            const PROXY = "https://api.allorigins.win/raw?url=";

            const feed = document.getElementById("feed");
            const titleEl = document.getElementById("title");
            const categoryEl = document.getElementById("category");
            const descEl = document.getElementById("description");

            function loadData() {
                const xhr = new XMLHttpRequest();
                xhr.open("GET", PROXY + encodeURIComponent(XML_URL), true);

                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4 && xhr.status === 200) {
                        const parser = new DOMParser();
                        const xmlDoc = parser.parseFromString(xhr.responseText, "text/xml");

                        const items = xmlDoc.getElementsByTagName("item");

                        if (items.length > 0) {
                            // Sorteia uma notícia
                            const news = items[Math.floor(Math.random() * items.length)];

                            const data = {
                                title: news.getElementsByTagName("title")[0].textContent,
                                category: news.getElementsByTagName("category")[0].textContent,
                                description: news.getElementsByTagName("truncate")[0].textContent,
                                image: news.getElementsByTagName("image")[0].textContent
                            };

                            // Pré-carrega a imagem da notícia
                            const imgPreload = new Image();
                            imgPreload.src = data.image;
                            imgPreload.onload = function() {
                                render(data);
                            };
                            imgPreload.onerror = function() {
                                render(data);
                            };
                        }
                    }
                };
                xhr.send();
            }

            function render(data) {
                // Delay de 1.5 segundos solicitado
                setTimeout(function() {
                    feed.style.backgroundImage = "url('" + data.image + "')";
                    titleEl.textContent = data.title;
                    categoryEl.textContent = data.category;
                    descEl.textContent = data.description;

                    feed.style.opacity = "1";
                }, 1500);
            }

            // Inicia o processo
            loadData();

            // Troca de notícia a cada 20 segundos
            setInterval(function() {
                feed.style.opacity = "0";
                setTimeout(loadData, 1000);
            }, 20000);

        })();
    </script>

</body>

</html>
