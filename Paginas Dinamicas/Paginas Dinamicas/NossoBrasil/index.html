<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Paisagens do Brasil | Natureza Viva</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html,
        body {
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
        
        #feed {
            position: relative;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: background-image 1.2s ease-in-out, opacity .8s;
            display: flex;
            align-items: flex-end;
            opacity: 0;
        }
        /* Overlay gradiente para garantir leitura */
        
        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.3) 50%, rgba(0, 0, 0, 0.1) 100%);
            z-index: 5;
        }
        
        .container {
            position: relative;
            width: 100%;
            padding: 0 6% 80px;
            z-index: 10;
        }
        
        .badge {
            display: inline-block;
            background: #2ecc71;
            /* Verde Natureza */
            padding: 6px 15px;
            font-size: .85em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        
        .region-tag {
            font-size: 1.1em;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
            display: block;
            color: #bdc3c7;
        }
        
        .title {
            font-family: 'Playfair Display', serif;
            font-size: 4.5em;
            line-height: 1.1;
            font-weight: 900;
            margin-bottom: 20px;
            text-shadow: 0 10px 30px rgba(0, 0, 0, .8);
        }
        
        .uf-label {
            font-size: 1.2em;
            font-weight: 700;
            color: #2ecc71;
            margin-bottom: 15px;
            display: block;
        }
        
        .desc {
            font-size: 1.3em;
            line-height: 1.6;
            max-width: 900px;
            opacity: .95;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }
        
        .line {
            margin-top: 30px;
            width: 150px;
            height: 4px;
            background: #2ecc71;
            border-radius: 2px;
        }
        
        .logo {
            position: absolute;
            top: 40px;
            right: 50px;
            width: 180px;
            z-index: 100;
            filter: drop-shadow(0 2px 10px rgba(0, 0, 0, 0.5));
        }
        
        @media(max-width:900px) {
            .title {
                font-size: 2.8em;
            }
            .desc {
                font-size: 1.1em;
            }
            .container {
                padding-bottom: 50px;
            }
        }
    </style>
</head>

<body>

    <div id="feed">
        <div class="overlay"></div>

        <div class="container">
            <span class="region-tag" id="region">Brasil</span>
            <span class="badge">Paisagens do Brasil</span>

            <h1 class="title" id="name">Descobrindo o Brasil...</h1>
            <span class="uf-label" id="uf"></span>

            <p class="desc" id="description"></p>
            <div class="line"></div>
        </div>

        <div class="logo">
            <h2 style="letter-spacing: 2px; font-weight: 900;">#NOSSOBRASIL</h2>
        </div>
    </div>

    <script>
        (function() {
            const XML_URL = "https://content.scripts.farolsign.com.br/estaticos/paisagens-do-brasil";
            const PROXY = "https://api.allorigins.win/raw?url=";

            const feed = document.getElementById("feed");
            const nameEl = document.getElementById("name");
            const regionEl = document.getElementById("region");
            const ufEl = document.getElementById("uf");
            const descEl = document.getElementById("description");

            function loadData() {
                const xhr = new XMLHttpRequest();
                xhr.open("GET", PROXY + encodeURIComponent(XML_URL), true);

                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4 && xhr.status === 200) {
                        const parser = new DOMParser();
                        const xmlDoc = parser.parseFromString(xhr.responseText, "text/xml");

                        // Coleta todas as regiões
                        const regions = xmlDoc.getElementsByTagName("region");
                        let allItems = [];

                        // Mapeia todos os itens de todas as regiões para uma lista única
                        for (let r = 0; r < regions.length; r++) {
                            const regionName = regions[r].getElementsByTagName("name")[0].textContent;
                            const items = regions[r].getElementsByTagName("item");

                            for (let i = 0; i < items.length; i++) {
                                allItems.push({
                                    region: regionName,
                                    name: items[i].getElementsByTagName("name")[0].textContent,
                                    uf: items[i].getElementsByTagName("uf")[0].textContent,
                                    description: items[i].getElementsByTagName("description")[0].textContent,
                                    image: items[i].getElementsByTagName("image")[0].textContent
                                });
                            }
                        }

                        if (allItems.length > 0) {
                            // Escolhe um local aleatório
                            const randomItem = allItems[Math.floor(Math.random() * allItems.length)];

                            // Pré-carregamento da imagem
                            const imgPreload = new Image();
                            imgPreload.src = randomItem.image;
                            imgPreload.onload = function() {
                                render(randomItem);
                            };
                            imgPreload.onerror = function() {
                                render(randomItem);
                            };
                        }
                    }
                };
                xhr.send();
            }

            function render(data) {
                // Aplica o delay de 1.5 segundos solicitado
                setTimeout(function() {
                    feed.style.backgroundImage = "url('" + data.image + "')";
                    nameEl.textContent = data.name;
                    regionEl.textContent = data.region;
                    ufEl.textContent = data.uf;
                    descEl.textContent = data.description;

                    feed.style.opacity = "1";
                }, 1000);
            }

            // Inicia o processo
            loadData();

            // Troca o conteúdo a cada 25 segundos
            setInterval(function() {
                feed.style.opacity = "0";
                setTimeout(loadData, 800);
            }, 25000);

        })();
    </script>

</body>

</html>
