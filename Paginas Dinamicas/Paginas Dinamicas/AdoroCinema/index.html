<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Adoro Cinema | Destaques</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html,
        body {
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
        
        #feed {
            position: relative;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            /* Aumentei o tempo da transição para ficar mais fluido */
            transition: background-image 1.2s ease-in-out, opacity 0.8s ease-in-out;
            display: flex;
            align-items: flex-end;
            opacity: 0;
        }
        
        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, .95) 0%, rgba(0, 0, 0, .4) 40%, rgba(0, 0, 0, 0) 100%), linear-gradient(to right, rgba(0, 0, 0, .8) 0%, rgba(0, 0, 0, 0) 60%);
            z-index: 5;
        }
        
        .container {
            position: relative;
            width: 100%;
            padding: 0 6% 100px;
            z-index: 10;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
        }
        
        .content {
            max-width: 60%;
        }
        
        .badge {
            display: inline-block;
            background: #E50914;
            padding: 6px 15px;
            font-size: .85em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 25px;
            border-radius: 4px;
        }
        
        .title {
            font-family: 'Playfair Display', serif;
            font-size: 4em;
            line-height: 1.05;
            font-weight: 900;
            margin-bottom: 20px;
            text-shadow: 0 10px 30px rgba(0, 0, 0, .6);
        }
        
        .desc {
            font-size: 1.4em;
            line-height: 1.5;
            max-width: 800px;
            opacity: .9;
        }
        
        .line {
            margin-top: 25px;
            width: 120px;
            height: 6px;
            background: #E50914;
            border-radius: 3px;
        }
        
        .poster {
            width: 300px;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, .6);
        }
        
        .logo {
            position: absolute;
            top: 20px;
            right: 70px;
            width: 200px;
            z-index: 150;
        }
        
        .logo img {
            width: 100%;
        }
        
        @media(max-width:900px) {
            .title {
                font-size: 2.6em;
            }
            .desc {
                font-size: 1.1em;
            }
            .poster {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div id="feed">
        <div class="overlay"></div>
        <div class="container">
            <div class="content">
                <span class="badge">Adoro Cinema</span>
                <h1 class="title" id="title">Carregando catálogo...</h1>
                <p class="desc" id="desc"></p>
                <div class="line"></div>
            </div>
            <img id="poster" class="poster">
        </div>
        <div class="logo">
            <img src="https://images.seeklogo.com/logo-png/44/2/adorocinema-logo-png_seeklogo-447686.png">
        </div>
    </div>

    <script>
        (function() {
            const XML_URL = "https://content.scripts.farolsign.com.br/dinamicos/scraper/outros/adoro-cinema";
            const PROXY = "https://api.allorigins.win/raw?url=";

            const feed = document.getElementById("feed");
            const titleEl = document.getElementById("title");
            const descEl = document.getElementById("desc");
            const posterEl = document.getElementById("poster");

            function loadData() {
                // 1. Primeiro esconde o conteúdo atual
                feed.style.opacity = "0";

                const xhr = new XMLHttpRequest();
                xhr.open("GET", PROXY + encodeURIComponent(XML_URL), true);

                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4 && xhr.status === 200) {
                        const parser = new DOMParser();
                        const xmlDoc = parser.parseFromString(xhr.responseText, "text/xml");

                        // Como é um feed com vários itens, vamos pegar um aleatório para a troca
                        const items = xmlDoc.getElementsByTagName("feed");
                        const randomIndex = Math.floor(Math.random() * items.length);
                        const selectedItem = items[randomIndex];

                        const name = selectedItem.getElementsByTagName("title")[0];
                        const desc = selectedItem.getElementsByTagName("cut")[0];
                        const bg = selectedItem.getElementsByTagName("normal")[0];
                        const cover = selectedItem.getElementsByTagName("cover")[0];

                        const data = {
                            name: name ? name.textContent : "",
                            desc: desc ? desc.textContent : "",
                            background: bg ? bg.textContent : "",
                            cover: cover ? cover.textContent : ""
                        };

                        // 2. Espera o fade-out terminar para trocar as imagens e textos
                        setTimeout(function() {
                            render(data);
                        }, 800);
                    }
                };
                xhr.send();
            }

            function render(data) {
                // Troca as fontes de dados
                feed.style.backgroundImage = "url('" + data.background + "')";
                titleEl.textContent = data.name;
                descEl.textContent = data.desc;
                posterEl.src = data.cover;

                // 3. Após trocar tudo, aplica o delay de 1.5s solicitado para mostrar
                setTimeout(function() {
                    feed.style.opacity = "1";
                }, 1500);
            }

            // Início imediato
            loadData();

            // Ciclo de atualização: Troca a cada 20 segundos
            setInterval(loadData, 20000);

        })();
    </script>
</body>

</html>
